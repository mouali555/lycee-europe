<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte - Lycée Europe</title>
    <link rel="stylesheet" href="styles/space-theme.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="space-body">
    <div class="stars"></div>
    
    <div class="space-container">
        <h1 class="space-title">REJOINDRE LE RÉSEAU BTS CIEL</h1>
        
        <div class="space-card">
            <form id="signupForm" class="space-form">
                <p style="color: rgba(255,255,255,0.7); margin-bottom: 1.5rem; font-size: 0.95rem; line-height: 1.5;">
                    Sécurité activée : Utilisez impérativement une adresse fournis par les admins.<br> Le mot de passe doit contenir <strong>au moins 6 caractères</strong>.
                </p>

                <div class="form-group">
                    <input type="email" id="email" required placeholder="MAIL" class="space-input">
                </div>
                
                <div class="form-group">
                    <input type="password" id="password" required placeholder="MDP" class="space-input">
                </div>
                
                <div id="authError" class="error-message" style="min-height: 20px;"></div>

                <button type="submit" class="space-btn">S'INSCRIRE</button>
                
                <div class="auth-switch">
                    <p><a href="index.html">← Retour à la connexion</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="scripts/firebase-config.js"></script>
    <script type="module" src="scripts/auth.js"></script>
</body>
</html>
