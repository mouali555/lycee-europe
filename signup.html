<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte - Écosystème CIEL</title>
    <link rel="stylesheet" href="styles/nature-theme.css">
</head>
<body>
    <div class="ambient-light"></div>
    
    <div class="center-container">
        <h1 class="nature-title">REJOINDRE LE RÉSEAU</h1>
        
        <div class="nature-card">
            <form id="signupForm" class="nature-form">
                <p style="color: var(--text-muted); margin-bottom: 0.5rem; font-size: 0.95rem; line-height: 1.5; text-align: center;">
                    Sécurité activée : Utilisez impérativement une adresse fournie par les admins.<br> Le mot de passe doit contenir <strong>au moins 6 caractères</strong>.
                </p>

                <div>
                    <input type="email" id="email" required placeholder="Email Académique" class="nature-input">
                </div>
                
                <div>
                    <input type="password" id="password" required placeholder="Nouveau mot de passe" class="nature-input">
                </div>
                
                <div id="authError" class="error-message"></div>

                <button type="submit" class="nature-btn">S'INSCRIRE</button>
                
                <div class="auth-switch">
                    <p><a href="index.html">← Retour à la connexion</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="scripts/firebase-config.js"></script>
    <script type="module" src="scripts/auth.js"></script>
</body>
</html>
