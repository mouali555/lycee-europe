<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Créer un profil étudiant — Écosystème BTS CIEL, Lycée Europe.">
    <title>Créer un profil — Écosystème CIEL</title>
    <link rel="stylesheet" href="styles/nature-theme.css">
</head>
<body class="auth-body">

    <div class="auth-panel">

        <!-- Logo / Marque -->
        <a href="index.html" class="auth-brand">
            <div class="auth-brand-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a10 10 0 0 1 10 10c0 5.52-4.48 10-10 10S2 17.52 2 12C2 6.48 6.48 2 12 2z"/>
                    <path d="M12 6v6l4 2"/>
                </svg>
            </div>
            <span class="auth-brand-name">Lycée Europe — BTS CIEL</span>
        </a>

        <!-- Carte principale -->
        <div class="auth-card">
            <div class="auth-card-header">
                <h1 class="auth-card-title">Rejoindre le réseau</h1>
                <p class="auth-card-subtitle">Créez votre profil étudiant pour accéder à l'écosystème numérique de votre promotion.</p>
            </div>

            <!-- Info box sécurité -->
            <div class="auth-info-box" style="margin-bottom: 1.5rem;">
                🔒 Seules les adresses fournies par les administrateurs sont autorisées. Le mot de passe doit contenir <strong>au moins 6 caractères</strong>.
            </div>

            <form id="signupForm" class="nature-form" novalidate>

                <div class="form-group">
                    <label class="form-label" for="email">Adresse email académique</label>
                    <input
                        type="email"
                        id="email"
                        class="nature-input"
                        placeholder="prénom.nom@goofy.bz"
                        autocomplete="email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Créer un mot de passe</label>
                    <input
                        type="password"
                        id="password"
                        class="nature-input"
                        placeholder="6 caractères minimum"
                        autocomplete="new-password"
                        required
                    >
                </div>

                <div id="authError" class="error-message"></div>

                <button type="submit" class="nature-btn">Créer mon profil</button>

            </form>
        </div>

        <!-- Retour connexion -->
        <p class="auth-footer">
            Déjà un compte ?
            <a href="index.html">← Se connecter</a>
        </p>

    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="scripts/firebase-config.js"></script>
    <script type="module" src="scripts/auth.js"></script>
</body>
</html>
