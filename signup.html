<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Créer un compte — Espace BTS CIEL, Lycée Europe">
    <title>Créer un compte · Lycée Europe</title>
    <link rel="stylesheet" href="styles/nature-theme.css">
</head>
<body class="auth-page">

    <a href="index.html" class="auth-logo">
        <div class="auth-logo-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
        </div>
        <div class="auth-logo-label">Lycée Europe</div>
        <div class="auth-logo-sub">Espace de travail BTS CIEL</div>
    </a>

    <div class="auth-card">
        <h1 class="auth-card-title">Créer un compte</h1>

        <form id="signupForm" class="auth-form" novalidate>
            <div class="alert-info">
                Seules les adresses <strong>@goofy.bz</strong> fournies par l'administration sont autorisées. Le mot de passe doit contenir au minimum 6 caractères.
            </div>
            <div class="field">
                <label class="field-label" for="email">Email académique</label>
                <input type="email" id="email" class="input input-lg" placeholder="prenom.nom@goofy.bz" autocomplete="email" required>
            </div>
            <div class="field">
                <label class="field-label" for="password">Mot de passe</label>
                <input type="password" id="password" class="input input-lg" placeholder="6 caractères minimum" autocomplete="new-password" required>
            </div>
            <div id="authError" class="error-message"></div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">
                Créer mon accès
            </button>
        </form>
    </div>

    <div class="auth-footer">
        Déjà un compte ?
        <a href="index.html">Se connecter</a>
    </div>

    <script type="module" src="scripts/firebase-config.js"></script>
    <script type="module" src="scripts/auth.js"></script>
</body>
</html>
