<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Lycée Europe</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <a href="index.html" class="back-link">← Retour à l'accueil</a>
    
    <div class="auth-container glass-card">
        <div class="auth-header">
            <h2>Lycée Europe</h2>
            <p>Connectez-vous à votre espace BTS</p>
        </div>

        <form id="authForm" class="auth-form">
            <div class="form-group">
                <label for="email">Adresse E-mail</label>
                <input type="email" id="email" required placeholder="prenom.nom@lycee-europe.com">
            </div>
            
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <div id="authError" class="error-message"></div>

            <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
            
            <div class="auth-switch">
                <p>Pas encore de compte ? <a href="#" id="switchAuthMode">Créer un compte</a></p>
            </div>
        </form>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="scripts/firebase-config.js"></script>
    <script type="module" src="scripts/auth.js"></script>
</body>
</html>
