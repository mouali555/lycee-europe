<!DOCTYPE html>
<html>
<head>
    <title>Test Roulette Wheel</title>
    <style>
        body {
            background: #0A0A0A;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .wheel-container {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="wheel-container">
        <canvas id="wheelCanvas" width="300" height="300"></canvas>
    </div>

    <script>
        let currentRotation = 0;
        const FULL_CIRCLE = 360;

        function initWheel() {
            const canvas = document.getElementById('wheelCanvas');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 140;
            
            // European Roulette numbers in wheel order
            const rouletteNumbers = [
                0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10,
                5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26
            ];
            
            // Color mapping for European roulette (0 is green, odd/even pattern)
            function getRouletteColor(num) {
                if (num === 0) return '#2F8D2F'; // Green for 0
                const redNumbers = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
                return redNumbers.includes(num) ? '#B91C1C' : '#0A0A0A'; // Red or Black
            }
            
            function drawWheel(rotation = 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(rotation * Math.PI / 180);
                
                const anglePerSegment = FULL_CIRCLE / rouletteNumbers.length;
                
                // Draw outer golden rim
                ctx.beginPath();
                ctx.arc(0, 0, radius + 8, 0, 2 * Math.PI);
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 8;
                ctx.stroke();
                
                // Draw segments
                rouletteNumbers.forEach((num, i) => {
                    const startAngle = (i * anglePerSegment) * Math.PI / 180;
                    const endAngle = ((i + 1) * anglePerSegment) * Math.PI / 180;
                    
                    // Draw segment
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.arc(0, 0, radius, startAngle, endAngle);
                    ctx.closePath();
                    ctx.fillStyle = getRouletteColor(num);
                    ctx.fill();
                    ctx.strokeStyle = '#FFD700';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    
                    // Draw number - FIXED VERSION
                    ctx.save();
                    const midAngle = startAngle + (endAngle - startAngle) / 2;
                    ctx.rotate(midAngle);
                    ctx.translate(radius * 0.75, 0);
                    // Rotate text to keep it upright (facing outward from center)
                    ctx.rotate(Math.PI / 2);
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = 'bold 14px Arial';
                    ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
                    ctx.shadowBlur = 4;
                    ctx.fillText(num.toString(), 0, 0);
                    ctx.shadowBlur = 0;
                    ctx.restore();
                });
                
                // Center decorative circle
                ctx.beginPath();
                ctx.arc(0, 0, 28, 0, 2 * Math.PI);
                ctx.fillStyle = '#FFD700';
                ctx.fill();
                ctx.strokeStyle = '#DAA520';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // Center star decoration
                ctx.fillStyle = '#0A0A0A';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('★', 0, 0);
                
                ctx.restore();
            }
            
            drawWheel();
        }

        initWheel();
    </script>
</body>
</html>
