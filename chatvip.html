<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP - Lycée de l'Europe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="vip-mode"> <div class="app-container">
    <aside>
        <div class="logo"><i class="fas fa-bolt"></i> BTS CIEL</div>
        <nav>
            <ul>
                <li><a href="index.html"><i class="fas fa-home"></i> <span>Accueil</span></a></li>
                <li><a href="chat.html"><i class="fas fa-comment-dots"></i> <span>Chat</span></a></li>
                <li><a href="chatvip.html" class="active"><i class="fas fa-crown"></i> <span>VIP</span></a></li>
            </ul>
        </nav>
    </aside>

    <main>
        <div class="top-bar" style="border-bottom-color: rgba(251, 191, 36, 0.3);">
            <h1 style="color: #fbbf24;">Espace VIP 🔒</h1>
        </div>

        <div id="login-screen" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center;">
            <div style="width:80px; height:80px; border-radius:50%; background:rgba(251, 191, 36, 0.1); display:flex; align-items:center; justify-content:center; margin-bottom:20px; border:1px solid #fbbf24;">
                <i class="fas fa-shield-halved fa-2x" style="color:#fbbf24;"></i>
            </div>
            <h2 style="margin-bottom:10px;">Accès Restreint</h2>
            <p style="color:#94a3b8; margin-bottom:30px; font-size:0.9rem;">Veuillez vous identifier pour accéder au réseau crypté.</p>
            
            <div class="capsule" style="flex-direction:column; max-width:300px; padding:20px; border-radius:20px; background:rgba(0,0,0,0.3);">
                <input type="password" id="code" placeholder="Code Secret" style="text-align:center; width:100%; border-bottom:1px solid #334155; padding:10px; margin-bottom:10px;">
                <input type="text" id="vip-pseudo" placeholder="Identifiant" style="text-align:center; width:100%; padding:10px;">
            </div>
            
            <button onclick="check()" style="margin-top:20px; background:#fbbf24; border:none; padding:12px 40px; border-radius:30px; font-weight:bold; cursor:pointer;">
                DÉVERROUILLER
            </button>
            <p id="error" style="color:#ef4444; margin-top:15px; font-size:0.9rem; min-height:20px;"></p>
        </div>

        <div id="chat-interface" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
            <div id="chat-feed" class="chat-wrapper"></div>
            
            <div class="input-area">
                <div class="capsule" style="border-color: rgba(251, 191, 36, 0.3);">
                    <input type="text" id="msg-input" placeholder="Message crypté...">
                    <button class="btn-send" onclick="envoyerVip()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCpo7up--nfVG4zj_Zeu4kB7pr34ad4ceM",
        authDomain: "lycee-europe-private.firebaseapp.com",
        projectId: "lycee-europe-private",
        storageBucket: "lycee-europe-private.firebasestorage.app",
        messagingSenderId: "259168134432",
        appId: "1:259168134432:web:470f5536d9305b4cf86345"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let me = "";

    async function check() {
        const c = document.getElementById("code").value;
        const p = document.getElementById("vip-pseudo").value;
        try {
            const doc = await db.collection("config").doc("access").get();
            if(c === doc.data().code && p) {
                me = p;
                document.getElementById("login-screen").style.display="none";
                document.getElementById("chat-interface").style.display="flex";
                listen();
            } else {
                document.getElementById("error").innerText = "Code d'accès refusé.";
            }
        } catch(e) { console.error(e); }
    }

    function listen() {
        db.collection("messages_prives").orderBy("timestamp").onSnapshot(snap => {
            const feed = document.getElementById("chat-feed");
            feed.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const isMe = d.pseudo === me;
                feed.innerHTML += `
                    <div style="${!isMe ? 'margin-bottom:2px' : ''}">
                        ${!isMe ? `<div class="pseudo-label">${d.pseudo}</div>` : ''}
                        <div class="msg ${isMe ? 'me' : ''}">
                            ${!isMe ? `<div class="avatar" style="background:#fbbf24; color:black;">${d.pseudo[0]}</div>` : ''}
                            <div class="bubble">${d.message}</div>
                        </div>
                    </div>`;
            });
            feed.scrollTop = feed.scrollHeight;
        });
    }

    function envoyerVip() {
        const m = document.getElementById("msg-input").value.trim();
        if(m) {
            db.collection("messages_prives").add({
                pseudo: me, message: m,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById("msg-input").value = "";
        }
    }
    
    document.getElementById("msg-input").addEventListener("keypress", (e) => e.key === "Enter" && envoyerVip());
</script>

</body>
</html>
