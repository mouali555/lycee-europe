<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Espace VIP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="vip-theme"> <div class="app-container">
    <aside>
        <div class="logo"><i class="fas fa-crown" style="color: var(--vip-gold);"></i> VIP ACCESS</div>
        <nav>
            <ul>
                <li><a href="index.html"><i class="fas fa-grid-2"></i> Dashboard</a></li>
                <li><a href="chat.html"><i class="fas fa-comments"></i> Chat Public</a></li>
                <li><a href="chatvip.html" class="active vip-link"><i class="fas fa-gem"></i> Espace VIP</a></li>
            </ul>
        </nav>
    </aside>

    <main>
        <header>
            <h1 style="color: var(--vip-gold);">Salon Privé <i class="fas fa-lock" style="font-size:1.5rem"></i></h1>
        </header>

        <div id="login-overlay" class="card" style="max-width: 500px; margin: 0 auto; text-align: center; padding: 3rem;">
            <i class="fas fa-shield-halved fa-4x" style="color: var(--vip-gold); margin-bottom: 20px;"></i>
            <h2 style="margin-bottom: 20px;">Authentification Requise</h2>
            <input type="password" id="vip-code" placeholder="Code Secret" style="width: 100%; margin-bottom: 10px; text-align: center;">
            <input type="text" id="vip-pseudo" placeholder="Votre Identifiant" style="width: 100%; margin-bottom: 20px; text-align: center;">
            <button class="send" onclick="checkAuth()" style="width: 100%; padding: 12px; background: var(--vip-gold);">ENTRER</button>
            <p id="error-msg" style="color: #ef4444; margin-top: 15px; font-size: 0.9rem;"></p>
        </div>

        <div id="vip-interface" class="card chat-window" style="display: none; border-color: var(--vip-gold);">
            <div id="messages" class="messages-area"></div>
            <div class="input-zone">
                <input type="text" id="msg" placeholder="Message chiffré..." style="flex: 1;">
                <button class="send" onclick="envoyerVip()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCpo7up--nfVG4zj_Zeu4kB7pr34ad4ceM",
        authDomain: "lycee-europe-private.firebaseapp.com",
        projectId: "lycee-europe-private",
        storageBucket: "lycee-europe-private.firebasestorage.app",
        messagingSenderId: "259168134432",
        appId: "1:259168134432:web:470f5536d9305b4cf86345"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUser = "";

    async function checkAuth() {
        const code = document.getElementById("vip-code").value;
        const pseudo = document.getElementById("vip-pseudo").value;
        
        try {
            const doc = await db.collection("config").doc("access").get();
            if (code === doc.data().code && pseudo) {
                currentUser = pseudo;
                document.getElementById("login-overlay").style.display = "none";
                document.getElementById("vip-interface").style.display = "flex";
                startListening();
            } else {
                document.getElementById("error-msg").innerText = "Accès refusé. Identifiants incorrects.";
            }
        } catch(e) { console.error(e); }
    }

    function startListening() {
        db.collection("messages_prives").orderBy("timestamp").onSnapshot(snap => {
            const div = document.getElementById("messages");
            div.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const isMe = d.pseudo === currentUser;
                div.innerHTML += `
                    <div class="msg ${isMe ? 'me' : ''}">
                        <div class="msg-avatar" style="background: var(--vip-gold); color: black;">${d.pseudo[0]}</div>
                        <div class="msg-content">${d.message}</div>
                    </div>`;
            });
            div.scrollTop = div.scrollHeight;
        });
    }

    function envoyerVip() {
        const m = document.getElementById("msg").value;
        if(m) {
            db.collection("messages_prives").add({
                pseudo: currentUser, message: m,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById("msg").value = "";
        }
    }
</script>
</body>
</html>
