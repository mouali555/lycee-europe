<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Elite Access</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="vip-mode">
    <div class="app-container">
        <aside>
            <div class="logo"><i class="fas fa-crown"></i> ELITE</div>
            <nav>
                <a href="index.html"><i class="fas fa-home"></i> Dashboard</a>
                <a href="chat.html"><i class="fas fa-comments"></i> Chat Global</a>
                <a href="chatvip.html" class="active"><i class="fas fa-crown"></i> Elite Access</a>
            </nav>
        </aside>

        <main>
            <div id="lock" style="position:absolute; inset:0; z-index:99; background:#030712; display:flex; align-items:center; justify-content:center;">
                <div style="text-align:center; padding:30px; border:1px solid var(--vip); border-radius:20px;">
                    <i class="fas fa-lock fa-3x" style="color:var(--vip); margin-bottom:15px;"></i>
                    <input type="password" id="p" placeholder="Code Elite" style="width:100%; padding:10px; margin-bottom:10px; text-align:center;">
                    <button onclick="unlock()" style="width:100%; padding:10px; background:var(--vip); border:none; border-radius:10px; cursor:pointer;">AUTH_EXEC</button>
                </div>
            </div>

            <div id="chat-content" style="display:none; flex-direction:column; flex:1;">
                <div class="top-bar">
                    <h1 style="color:var(--vip)">Elite Channel</h1>
                </div>
                <div id="chat-v" class="chat-wrapper"></div>
                <div class="input-area">
                    <div class="capsule" style="border:1px solid var(--vip)">
                        <input type="text" id="mv" placeholder="Signal crypté...">
                        <button class="btn-send" style="background:var(--vip); color:black;" onclick="sendV()"><i class="fas fa-shield-alt"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script>
        firebase.initializeApp({ apiKey: "AIzaSyCpo7up--nfVG4zj_Zeu4kB7pr34ad4ceM", authDomain: "lycee-europe-private.firebaseapp.com", projectId: "lycee-europe-private" });
        const db = firebase.firestore();

        async function unlock() {
            const pass = document.getElementById("p").value;
            const doc = await db.collection("config").doc("access").get();
            if(pass === doc.data().code) {
                document.getElementById("lock").style.display = "none";
                document.getElementById("chat-content").style.display = "flex";
                db.collection("messages_prives").orderBy("timestamp").onSnapshot(snap => {
                    const f = document.getElementById("chat-v");
                    let h = "";
                    snap.forEach(d => {
                        const data = d.data(); if(!data.timestamp) return;
                        h += `<div class="msg-group"><div class="bubble">${data.message}</div></div>`;
                    });
                    f.innerHTML = h; f.scrollTop = f.scrollHeight;
                });
            }
        }

        function sendV() {
            const m = document.getElementById("mv").value;
            if(m) {
                db.collection("messages_prives").add({ pseudo: "VIP", message: m, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                document.getElementById("mv").value = "";
            }
        }
    </script>
</body>
</html>
