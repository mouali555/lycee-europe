<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat VIP - Accès Restreint</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-firestore.js"></script>
</head>
<body class="vip-mode"> <div id="access-screen" class="login-overlay">
        <div class="login-box">
            <i class="fas fa-crown logo-icon" style="font-size: 3rem; margin-bottom: 20px;"></i>
            <h2>Accès Sécurisé</h2>
            <p style="color: #aaa; margin-bottom: 10px;">Réservé aux membres autorisés</p>
            <input type="password" id="password-input" placeholder="Mot de passe">
            <button onclick="checkAccess()">Déverrouiller</button>
            <p id="error-msg" style="color: var(--neon-red); margin-top: 10px; display: none;">Accès Refusé</p>
        </div>
    </div>

    <div id="pseudo-screen" class="login-overlay" style="display: none;">
        <div class="login-box">
            <h2>Identité VIP</h2>
            <input type="text" id="username-input" placeholder="Alias...">
            <button onclick="enterChat()">Entrer</button>
        </div>
    </div>

    <header class="main-header">
        <div class="logo-group">
            <a href="index.html" class="nav-item"><i class="fas fa-arrow-left"></i> Quitter</a>
            <h1>Zone VIP</h1>
        </div>
        <span class="status-badge"><i class="fas fa-lock"></i> SECURE</span>
    </header>

    <div class="chat-layout">
        <div class="chat-box glass-panel">
            <div id="messages"></div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Message crypté...">
                <button id="send-btn" class="btn-send"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        // ⚠️⚠️⚠️ COLLE ICI TA CONFIGURATION FIREBASE ORIGINALE ⚠️⚠️⚠️
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        // Attention : Vérifie si ta collection s'appelle "messages_vip" ou autre dans ton ancien fichier
        const messagesRef = db.collection("messages_vip"); 

        let currentPseudo = "";

        // Gestion Mot de passe
        function checkAccess() {
            const pass = document.getElementById("password-input").value;
            // 🔒 Change "1234" par ton mot de passe voulu
            if (pass === "1234") { 
                document.getElementById("access-screen").style.display = "none";
                document.getElementById("pseudo-screen").style.display = "flex";
            } else {
                document.getElementById("error-msg").style.display = "block";
            }
        }

        function enterChat() {
            const pseudo = document.getElementById("username-input").value.trim();
            if (pseudo) {
                currentPseudo = pseudo;
                document.getElementById("pseudo-screen").style.display = "none";
                listenMessages();
            }
        }

        // Envoi
        document.getElementById("message-input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
        document.getElementById("send-btn").addEventListener("click", sendMessage);

        function sendMessage() {
            const input = document.getElementById("message-input");
            const text = input.value.trim();
            if (text && currentPseudo) {
                messagesRef.add({
                    pseudo: currentPseudo,
                    message: text,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                input.value = "";
            }
        }

        function listenMessages() {
            const msgDiv = document.getElementById("messages");
            messagesRef.orderBy("timestamp").onSnapshot((snapshot) => {
                msgDiv.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const date = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'}) : '--:--';
                    
                    const div = document.createElement("div");
                    div.className = "message-row";
                    div.innerHTML = `
                        <div class="avatar">${data.pseudo.charAt(0).toUpperCase()}</div>
                        <div class="msg-bubble">
                            <div class="msg-header">
                                <span>${data.pseudo}</span>
                                <small>${date}</small>
                            </div>
                            <div class="msg-text">${data.message}</div>
                        </div>
                    `;
                    msgDiv.appendChild(div);
                });
                msgDiv.scrollTop = msgDiv.scrollHeight;
            });
        }
    </script>
</body>
</html>
