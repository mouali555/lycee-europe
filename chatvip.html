<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat VIP – Lycée de l'Europe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <h1>Chat VIP 🔐</h1>
        <a href="index.html" style="color:white; text-decoration:none;"><i class="fas fa-house"></i> Accueil</a>
    </header>

    <div class="container">
        <main>
            <article class="card">
                <div id="access-screen">
                    <h2>Accès VIP</h2>
                    <input type="password" id="access-code" placeholder="Code secret" style="padding:10px; width:100%; margin-bottom:10px;">
                    <input type="text" id="pseudo" placeholder="Pseudo" style="padding:10px; width:100%;">
                    <button onclick="enterChat()" style="margin-top:10px; padding:10px; width:100%; background:#fbbf24; color:black; font-weight:bold; border:none; cursor:pointer;">Se connecter</button>
                    <p id="error" style="color:red;"></p>
                </div>

                <div id="chat-ui" style="display:none;">
                    <div id="messages" style="height:400px; overflow-y:auto; color:white; background:rgba(0,0,0,0.5); padding:10px; border-radius:10px; margin-bottom:10px;"></div>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="message" style="flex:1; padding:10px;">
                        <button onclick="sendMessage()" style="padding:10px; background:#fbbf24;">Envoyer</button>
                    </div>
                </div>
            </article>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyCpo7up--nfVG4zj_Zeu4kB7pr34ad4ceM",
            authDomain: "lycee-europe-private.firebaseapp.com",
            projectId: "lycee-europe-private",
            storageBucket: "lycee-europe-private.firebasestorage.app",
            messagingSenderId: "259168134432",
            appId: "1:259168134432:web:470f5536d9305b4cf86345"
        });
        const db = firebase.firestore();
        let currentPseudo = null;

        async function enterChat() {
            const code = document.getElementById("access-code").value;
            const pseudo = document.getElementById("pseudo").value.trim();
            const configDoc = await db.collection("config").doc("access").get();
            
            if(code === configDoc.data().code) {
                currentPseudo = pseudo;
                document.getElementById("access-screen").style.display = "none";
                document.getElementById("chat-ui").style.display = "block";
                listenMessages();
            } else {
                document.getElementById("error").innerText = "Code incorrect";
            }
        }

        function listenMessages() {
            db.collection("messages_prives").orderBy("timestamp").onSnapshot(snap => {
                const div = document.getElementById("messages");
                div.innerHTML = "";
                snap.forEach(doc => {
                    div.innerHTML += `<p><strong>${doc.data().pseudo}:</strong> ${doc.data().message}</p>`;
                });
                div.scrollTop = div.scrollHeight;
            });
        }

        async function sendMessage() {
            const input = document.getElementById("message");
            await db.collection("messages_prives").add({
                pseudo: currentPseudo,
                message: input.value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = "";
        }
    </script>
</body>
</html>
