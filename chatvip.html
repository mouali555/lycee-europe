<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat VIP – Lycée de l'Europe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* CSS SPECIFIQUE VIP - ACCENTS VIOLETS */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .home-link {
            background: transparent;
            color: var(--neon-pink);
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid var(--neon-pink);
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .home-link:hover {
            background: var(--neon-pink);
            color: #fff;
            box-shadow: 0 0 15px var(--neon-pink);
        }

        .chat-container {
            background: rgba(10, 0, 10, 0.7);
            padding: 15px;
            border: 1px solid var(--neon-pink);
            height: 75vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .chat-container::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(transparent 95%, var(--neon-pink) 100%);
            background-size: 100% 20px;
            opacity: 0.1;
            pointer-events: none;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-thumb { background: var(--neon-pink); }
        #messages::-webkit-scrollbar-track { background: #111; }

        .message-row { display: flex; gap: 12px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .avatar {
            width: 40px;
            height: 40px;
            background: #000;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            box-shadow: 0 0 5px var(--neon-cyan);
        }

        .message-card {
            background: rgba(188, 19, 254, 0.1);
            padding: 12px 16px;
            max-width: 80%;
            border-left: 2px solid var(--neon-pink);
            color: #e5e7eb;
        }

        .message-header {
            font-size: 0.8rem;
            color: var(--neon-pink);
            margin-bottom: 4px;
            font-family: 'Orbitron', sans-serif;
        }

        .message-body {
            font-size: 0.95rem;
            font-family: 'Share Tech Mono', monospace;
        }

            display: flex;
            align-items: center;
            background: #000;
