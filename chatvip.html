<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace VIP | Lycée de l'Europe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard">

    <nav class="sidebar">
        <div class="sidebar-logo">
            <i class="fas fa-graduation-cap"></i>
            <span>BTS CIEL</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-th-large"></i><span>Dashboard</span></a></li>
            <li><a href="chat.html"><i class="fas fa-comments"></i><span>Chat Public</span></a></li>
            <li><a href="chatvip.html" class="active"><i class="fas fa-shield-halved"></i><span>Espace VIP</span></a></li>
        </ul>
    </nav>

    <div class="main-content">
        <header class="top-bar">
            <div class="page-title">
                <h2><i class="fas fa-lock" style="color: #fbbf24;"></i> Salon Privé</h2>
            </div>
            <div id="user-display" class="user-profile"></div>
        </header>

        <main class="dashboard-view">
            <div class="card chat-app-card" style="border-top: 3px solid #fbbf24;">
                
                <div id="auth-overlay" class="auth-box">
                    <div class="vip-icon"><i class="fas fa-key fa-2x"></i></div>
                    <h3>Accès Restreint</h3>
                    <p>Ce salon nécessite une accréditation.</p>
                    <input type="password" id="vip-code" placeholder="Code secret VIP">
                    <input type="text" id="pseudo" placeholder="Votre nom">
                    <button onclick="checkVipAccess()" class="action-btn" style="background: #fbbf24; color: #000; border:none; width:100%; font-weight:bold;">
                        Vérifier l'accès
                    </button>
                    <p id="error-msg" style="color: #ef4444; margin-top: 10px; font-size: 0.8rem;"></p>
                </div>

                <div id="chat-interface" style="display: none; flex-direction: column; height: 100%;">
                    <div id="messages" class="messages-container"></div>
                    <div class="input-area">
                        <input type="text" id="message" placeholder="Message chiffré...">
                        <button id="send-btn" style="background: #fbbf24; color: #000;"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        let currentPseudo = null;
        const messagesRef = db.collection("messages_prives");

        async function checkVipAccess() {
            const code = document.getElementById("vip-code").value;
            const pseudo = document.getElementById("pseudo").value.trim();
            const error = document.getElementById("error-msg");

            try {
                // On récupère le code stocké sur Firestore pour la sécurité
                const doc = await db.collection("config").doc("access").get();
                if (code === doc.data().code && pseudo) {
                    currentPseudo = pseudo;
                    document.getElementById("auth-overlay").style.display = "none";
                    document.getElementById("chat-interface").style.display = "flex";
                    document.getElementById("user-display").innerHTML = `<span>VIP: ${currentPseudo}</span>`;
                    listenMessages();
                } else {
                    error.innerText = "Accès refusé : Identifiants invalides.";
                }
            } catch (e) { error.innerText = "Erreur de connexion serveur."; }
        }

        function listenMessages() {
            messagesRef.orderBy("timestamp").onSnapshot(snap => {
                const div = document.getElementById("messages");
                div.innerHTML = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    const isMe = data.pseudo === currentPseudo;
                    const msgRow = document.createElement("div");
                    msgRow.className = `msg-row ${isMe ? 'me' : ''}`;
                    msgRow.innerHTML = `<div class="msg-bubble"><small>${data.pseudo}</small><p>${data.message}</p></div>`;
                    div.appendChild(msgRow);
                });
                div.scrollTop = div.scrollHeight;
            });
        }

        async function sendMessage() {
            const input = document.getElementById("message");
            if (!input.value.trim()) return;
            await messagesRef.add({
                pseudo: currentPseudo,
                message: input.value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = "";
        }
        document.getElementById("message")?.addEventListener("keydown", e => e.key === "Enter" && sendMessage());
    </script>
</body>
</html>
