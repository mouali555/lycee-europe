<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accès Sécurisé | VIP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Styles spécifiques au salon VIP pour le différencier du public */
        :root { --accent-vip: #fbbf24; }
        .vip-border { border-top: 3px solid var(--accent-vip) !important; }
        .auth-overlay {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 3rem; text-align: center;
        }
        .vip-input {
            background: rgba(0,0,0,0.3) !important;
            border: 1px solid rgba(251, 191, 36, 0.2) !important;
            margin-bottom: 1rem; width: 100%; max-width: 300px;
        }
        .btn-vip {
            background: var(--accent-vip) !important;
            color: #000 !important; font-weight: 800 !important;
            width: 100%; max-width: 300px;
        }
        .vip-msg-header { color: var(--accent-vip) !important; font-weight: 700; }
    </style>
</head>
<body>

<header>
    <h1>ESPACE RÉSERVÉ</h1>
    <a href="index.html" style="color: var(--accent-vip); text-decoration: none;"><i class="fas fa-house"></i> Quitter</a>
</header>

<div class="container" style="grid-template-columns: 1fr;">
    <main style="max-width: 900px; margin: 0 auto; width: 100%;">
        <div class="card vip-border" id="vip-logic">
            
            <div id="lock-screen" class="auth-overlay">
                <i class="fas fa-shield-halved fa-4x" style="color: var(--accent-vip); margin-bottom: 1.5rem;"></i>
                <h2 style="margin-bottom: 0.5rem;">Authentification Requise</h2>
                <p style="color: var(--text-dim); margin-bottom: 2rem;">Veuillez entrer le code d'accréditation et votre identifiant.</p>
                
                <input type="password" id="vip-code" class="vip-input" placeholder="Code secret">
                <input type="text" id="pseudo" class="vip-input" placeholder="Identifiant">
                <button onclick="checkAccess()" class="btn-vip btn-action">DÉVERROUILLER</button>
                
                <p id="error-msg" style="color: #f87171; margin-top: 1rem; font-size: 0.8rem;"></p>
            </div>

            <div id="vip-chat" class="chat-container" style="display: none;">
                <div id="messages"></div>
                <div class="smart-input-bar">
                    <input type="text" id="msg" placeholder="Envoyer un message sécurisé...">
                    <button id="send-btn" onclick="envoyer()" style="background: var(--accent-vip); color: #000;">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>

        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCpo7up--nfVG4zj_Zeu4kB7pr34ad4ceM",
        authDomain: "lycee-europe-private.firebaseapp.com",
        projectId: "lycee-europe-private",
        storageBucket: "lycee-europe-private.firebasestorage.app",
        messagingSenderId: "259168134432",
        appId: "1:259168134432:web:470f5536d9305b4cf86345"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentPseudo = "";

    async function checkAccess() {
        const code = document.getElementById("vip-code").value;
        const pseudo = document.getElementById("pseudo").value.trim();
        const error = document.getElementById("error-msg");

        try {
            const config = await db.collection("config").doc("access").get();
            if (code === config.data().code && pseudo !== "") {
                currentPseudo = pseudo;
                document.getElementById("lock-screen").style.display = "none";
                document.getElementById("vip-chat").style.display = "flex";
                listenVip();
            } else {
                error.innerText = "Accès refusé. Code invalide.";
            }
        } catch (e) {
            error.innerText = "Erreur de connexion au serveur.";
        }
    }

    function listenVip() {
        db.collection("messages_prives").orderBy("timestamp").onSnapshot(snap => {
            const box = document.getElementById("messages");
            box.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                box.innerHTML += `
                    <div class="message-row">
                        <div class="message-header vip-msg-header">${d.pseudo}</div>
                        <div class="message-card">${d.message}</div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    async function envoyer() {
        const msg = document.getElementById("msg").value;
        if(!msg) return;
        await db.collection("messages_prives").add({
            pseudo: currentPseudo,
            message: msg,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById("msg").value = "";
    }
</script>
</body>
</html>
