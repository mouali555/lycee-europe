<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nexus - VIP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="vip-mode">
<div class="app-container">
    <aside>
        <div class="logo"><i class="fas fa-crown"></i> ELITE</div>
        <nav>
            <a href="index.html"><i class="fas fa-th-large"></i> Accueil</a>
            <a href="chat.html"><i class="fas fa-comments"></i> Chat Global</a>
            <a href="chatvip.html" class="active"><i class="fas fa-crown"></i> Elite Zone</a>
        </nav>
    </aside>
    <main>
        <div id="lock" style="padding: 100px; text-align: center;">
            <i class="fas fa-lock fa-4x" style="color: var(--vip-gold); margin-bottom: 20px;"></i>
            <h2>Accès Restreint</h2>
            <input type="password" id="pass" placeholder="Code Elite" style="margin-top: 20px; padding: 10px; border-radius: 10px; border: 1px solid var(--vip-gold); background: none; color: white; text-align: center;">
            <button onclick="unlock()" style="background: var(--vip-gold); border: none; padding: 10px 20px; border-radius: 10px; margin-top: 10px; font-weight: bold; cursor: pointer;">ENTRER</button>
        </div>
        <div id="vip-ui" style="display: none; flex-direction: column; height: 100%;">
            <div class="top-bar"><h1># Protocol-Elite</h1></div>
            <div id="chat-v" class="chat-wrapper"></div>
            <div class="input-area">
                <div class="capsule" style="border-color: var(--vip-gold);">
                    <input type="text" id="mv" placeholder="Message crypté...">
                    <button class="btn-send" style="background: var(--vip-gold); color: black;" onclick="sendV()"><i class="fas fa-bolt"></i></button>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
    firebase.initializeApp({ apiKey: "AIzaSyCpo7up--nfVG4zj_Zeu4kB7pr34ad4ceM", authDomain: "lycee-europe-private.firebaseapp.com", projectId: "lycee-europe-private" });
    const db = firebase.firestore();

    async function unlock() {
        const p = document.getElementById("pass").value;
        const doc = await db.collection("config").doc("access").get();
        if(p === doc.data().code) {
            document.getElementById("lock").style.display = "none";
            document.getElementById("vip-ui").style.display = "flex";
            db.collection("messages_prives").orderBy("timestamp").onSnapshot(snap => {
                let h = "";
                snap.forEach(d => { h += `<div class="msg-group"><div class="bubble">${d.data().message}</div></div>`; });
                document.getElementById("chat-v").innerHTML = h;
            });
        }
    }
    function sendV() {
        const m = document.getElementById("mv").value;
        if(m) {
            db.collection("messages_prives").add({ message: m, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById("mv").value = "";
        }
    }
</script>
</body>
</html>
