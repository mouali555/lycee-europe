<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB - Lycée Europe</title>
    <link rel="stylesheet" href="styles/space-theme.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            width: 100%;
            margin-top: 2.5rem;
        }
        .hub-module {
            background: rgba(15, 25, 50, 0.4);
            border: 1px solid rgba(56, 116, 255, 0.3);
            border-radius: 12px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 180px;
        }
        .hub-module:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(30, 58, 138, 0.4);
            border-color: rgba(56, 116, 255, 0.8);
            box-shadow: 0 15px 40px rgba(0, 40, 120, 0.5), inset 0 0 20px rgba(56, 116, 255, 0.2);
        }
        .hub-module h3 {
            color: white;
            font-size: 1.3rem;
            margin-bottom: 0.8rem;
            letter-spacing: 2px;
        }
        .hub-module p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            line-height: 1.4;
        }
        /* Style des futurs modules bloqués */
        .hub-module.locked {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: rgba(255, 255, 255, 0.1);
        }
        .hub-module.locked:hover {
            transform: none;
            background: rgba(15, 25, 50, 0.4);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }
    </style>
</head>
<body class="space-body" style="justify-content: flex-start;">
    <div class="stars"></div>
    
    <nav class="space-navbar">
        <div style="font-weight: 600; font-size: 1.1rem; letter-spacing: 1px;">
            LYCÉE EUROPE <span style="color: #60a5fa; margin-left: 0.5rem; font-size: 0.8rem; border: 1px solid #60a5fa; padding: 2px 6px; border-radius: 12px;">HUB</span>
        </div>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <span id="userEmailDisplay" style="font-size: 0.9rem; color: rgba(255,255,255,0.7);">Chargement...</span>
            <button id="logoutBtn" class="space-btn" style="padding: 0.5rem 1rem; font-size: 0.85rem; width: auto; margin: 0;">DÉCONNEXION</button>
        </div>
    </nav>

    <div class="space-container" style="max-width: 900px; flex: 1; display: flex; flex-direction: column; justify-content: center;">
        <h1 class="space-title">PORTAIL BTS CIEL</h1>
        
        <div class="space-card" style="padding: 3rem;">
            <p style="color: rgba(255,255,255,0.8); text-align: center; font-size: 1.05rem;">
                Bienvenue sur le hub central. Sélectionnez un module pour commencer.
            </p>

            <div class="hub-grid">
                <!-- Module Tchat (Actif) -->
                <a href="chat.html" class="hub-module">
                    <h3>TCHAT</h3>
                    <p>Salon de communication général entre les étudiants</p>
                </a>
                
                <!-- Modules Futurs (Désactivés) -->
                <a href="#" class="hub-module locked" onclick="event.preventDefault();">
                    <h3>COURS & TP</h3>
                    <p>Module en cours de développement...</p>
                </a>
                
                <a href="#" class="hub-module locked" onclick="event.preventDefault();">
                    <h3>RESSOURCES</h3>
                    <p>Module en cours de développement...</p>
                </a>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="scripts/firebase-config.js"></script>
    <script type="module" src="scripts/auth.js"></script>
</body>
</html>
