<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside>
            <div class="logo"><i class="fas fa-terminal"></i> <span class="logo-text">NEXUS</span></div>
            <nav>
                <a href="index.html" class="active"><i class="fas fa-home"></i> <span>Dashboard</span></a>
                <a href="chat.html"><i class="fas fa-comments"></i> <span>Chat</span></a>
                <a href="chatvip.html"><i class="fas fa-crown"></i> <span>Elite</span></a>
            </nav>
        </aside>
        <main>
            <div class="top-bar"><h1>Nexus Hub</h1></div>
            <div style="padding: 20px; display: flex; flex-direction: column; gap: 20px; flex: 1; justify-content: center; align-items: center;">
                <div class="bubble" style="width: 100%; max-width: 400px; padding: 40px; text-align: center; cursor: pointer;" onclick="location.href='chat.html'">
                    <i class="fas fa-users fa-3x" style="color:var(--primary); margin-bottom: 20px;"></i>
                    <h2>CHAT PUBLIC</h2>
                    <p style="color:grey; margin-top: 10px;">Accès libre promo CIEL</p>
                </div>
                <div class="bubble" style="width: 100%; max-width: 400px; padding: 40px; text-align: center; border-color: var(--vip); cursor: pointer;" onclick="location.href='chatvip.html'">
                    <i class="fas fa-key fa-3x" style="color:var(--vip); margin-bottom: 20px;"></i>
                    <h2 style="color:var(--vip)">ZONE ELITE</h2>
                    <p style="color:grey; margin-top: 10px;">Accès sécurisé</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
