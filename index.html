<html>
<head>
    <title>Enhanced Homepage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f9f9f9;
            color: #333;
        }
        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: url('hero-bg.jpg') center/cover no-repeat;
            color: white;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.7);
        }
        .hero h1 {
            font-size: 4em;
            margin: 0;
        }
        .hero p {
            font-size: 1.5em;
            margin: 20px 0 40px 0;
        }
        .hero button {
            padding: 10px 20px;
            font-size: 1em;
            color: white;
            background-color: #007BFF;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .hero button:hover {
            background-color: #0056b3;
        }
        nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #333;
            padding: 15px;
        }
        nav a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            transition: transform 0.3s;
        }
        nav a:hover {
            transform: scale(1.1);
        }
        .cta {
            text-align: center;
            margin: 50px 0;
        }
        .cta button {
            padding: 15px 30px;
            font-size: 1.5em;
            color: white;
            background-color: #28a745;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .cta button:hover {
            background-color: #218838;
        }
        .dynamic-content {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 50px 20px;
        }
        .dynamic-content div {
            flex: 1 1 calc(33% - 40px);
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">About Us</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
    <div class="hero">
        <h1>Welcome to Our Website</h1>
        <p>Delivering the best experiences for our users</p>
        <button>Get Started</button>
    </div>
    <section class="cta">
        <h2>Join Us Today</h2>
        <button>Sign Up Now</button>
    </section>
    <section class="dynamic-content">
        <div>
            <h3>Feature One</h3>
            <p>Describe the first key feature.</p>
        </div>
        <div>
            <h3>Feature Two</h3>
            <p>Describe the second key feature.</p>
        </div>
        <div>
            <h3>Feature Three</h3>
            <p>Describe the third key feature.</p>
        </div>
    </section>
</body>
</html>
