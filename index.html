<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion · Lycée Europe</title>
    <link rel="stylesheet" href="styles/nature-theme.css">
</head>
<body class="auth">

<div class="auth-body">
    <div class="auth-logo-area">
        <div class="auth-logo-ico">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
        </div>
        <div class="auth-title">Lycée Europe</div>
        <div class="auth-sub">Espace BTS CIEL</div>
    </div>

    <div class="auth-form">
        <div class="auth-form-title">Connexion</div>
        <form id="loginForm">
            <div style="display:flex;flex-direction:column;gap:12px">
                <div class="field">
                    <label class="field-label" for="email">Email</label>
                    <input id="email" type="email" class="input" placeholder="prenom.nom@goofy.bz" autocomplete="email" required>
                </div>
                <div class="field">
                    <label class="field-label" for="password">Mot de passe</label>
                    <input id="password" type="password" class="input" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <div id="authError" class="error-message"></div>
                <button type="submit" class="btn btn-primary btn-block" style="margin-top:2px">
                    Se connecter
                </button>
            </div>
        </form>
    </div>

    <div class="auth-alt">
        Pas encore de compte ? <a href="signup.html">Créer un accès</a>
    </div>
</div>

<script type="module" src="scripts/firebase-config.js"></script>
<script type="module" src="scripts/auth.js"></script>
</body>
</html>
