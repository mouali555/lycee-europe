<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nexus Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside>
            <div class="logo"><i class="fas fa-terminal"></i> NEXUS</div>
            <nav>
                <a href="index.html" class="active"><i class="fas fa-home"></i> Dashboard</a>
                <a href="chat.html"><i class="fas fa-comments"></i> Chat Global</a>
                <a href="chatvip.html"><i class="fas fa-crown"></i> Elite Access</a>
            </nav>
        </aside>
        <main>
            <div class="top-bar">
                <h1>Système Nexus</h1>
            </div>
            <div style="padding: 50px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div style="background:var(--card); padding:30px; border-radius:20px; text-align:center; border:1px solid var(--border);">
                    <i class="fas fa-users fa-3x" style="color:var(--primary)"></i>
                    <h2 style="margin:20px 0;">Chat Public</h2>
                    <a href="chat.html" style="color:var(--primary); font-weight:bold;">Entrer</a>
                </div>
                <div style="background:var(--card); padding:30px; border-radius:20px; text-align:center; border:1px solid var(--vip);">
                    <i class="fas fa-crown fa-3x" style="color:var(--vip)"></i>
                    <h2 style="margin:20px 0;">Chat VIP</h2>
                    <a href="chatvip.html" style="color:var(--vip); font-weight:bold;">Déverrouiller</a>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
