<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Connexion à l'espace de travail BTS CIEL — Lycée Europe">
    <title>Connexion · Lycée Europe</title>
    <link rel="stylesheet" href="styles/nature-theme.css">
</head>
<body class="auth-page">

    <!-- Logo / Branding -->
    <a href="#" class="auth-logo">
        <div class="auth-logo-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
        </div>
        <div class="auth-logo-label">Lycée Europe</div>
        <div class="auth-logo-sub">Espace de travail BTS CIEL</div>
    </a>

    <!-- Card -->
    <div class="auth-card">
        <h1 class="auth-card-title">Connexion</h1>

        <form id="loginForm" class="auth-form" novalidate>
            <div class="field">
                <label class="field-label" for="email">Adresse email</label>
                <input type="email" id="email" class="input input-lg" placeholder="prenom.nom@goofy.bz" autocomplete="email" required>
            </div>
            <div class="field">
                <label class="field-label" for="password">
                    Mot de passe
                </label>
                <input type="password" id="password" class="input input-lg" placeholder="Votre mot de passe" autocomplete="current-password" required>
            </div>
            <div id="authError" class="error-message"></div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">
                Se connecter
            </button>
        </form>
    </div>

    <!-- Footer -->
    <div class="auth-footer">
        Nouveau sur la plateforme ?
        <a href="signup.html">Créer un compte</a>
    </div>

    <script type="module" src="scripts/firebase-config.js"></script>
    <script type="module" src="scripts/auth.js"></script>
</body>
</html>
