<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITE CRÉÉ PAR LES BTS CIEL POUR LES BTS CIEL</title>
    <!-- On charge uniquement le thème spatial pour cette page -->
    <link rel="stylesheet" href="styles/space-theme.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="space-body">
    <!-- Fond étoilé -->
    <div class="stars"></div>
    
    <div class="space-container">
        <!-- Titre principal -->
        <h1 class="space-title">SITE CRÉÉ PAR LES BTS CIEL POUR LES BTS CIEL</h1>
        
        <!-- Carte Glassmorphism -->
        <div class="space-card">
            <!-- Header avec icône IMPORTANT -->
            <div class="space-card-header">
            </div>
            
            <!-- Formulaire de connexion -->
            <form id="authForm" class="space-form">
                <div class="form-group">
                    <input type="email" id="email" required placeholder="MAIL" class="space-input">
                </div>
                
                <div class="form-group">
                    <input type="password" id="password" required placeholder="MDP" class="space-input">
                </div>
                
                <!-- Zone d'affichage des erreurs -->
                <div id="authError" class="error-message"></div>

                <!-- Bouton de soumission -->
                <button type="submit" class="space-btn" id="submitBtnDynamic">CONNEXION</button>
                
                <!-- Lien pour basculer Créer un compte / Se connecter -->
                <div class="auth-switch">
                    <p><span id="authModeText"></span> <a href="#" id="switchAuthMode">Créer un compte</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="scripts/firebase-config.js"></script>
    <script type="module" src="scripts/auth.js"></script>
</body>
</html>
