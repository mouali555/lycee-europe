<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Écosystème CIEL</title>
    <link rel="stylesheet" href="styles/nature-theme.css">
</head>
<body>
    <div class="ambient-light"></div>
    
    <div class="center-container">
        <!-- Titre principal -->
        <h1 class="nature-title">ÉCOSYSTÈME BTS CIEL</h1>
        
        <!-- Carte Glassmorphism -->
        <div class="nature-card">
            
            <!-- Formulaire de connexion -->
            <form id="loginForm" class="nature-form">
                <div>
                    <input type="email" id="email" required placeholder="Email Académique" class="nature-input">
                </div>
                
                <div>
                    <input type="password" id="password" required placeholder="Mot de passe" class="nature-input">
                </div>
                
                <!-- Zone d'affichage des erreurs -->
                <div id="authError" class="error-message"></div>

                <!-- Bouton de soumission -->
                <button type="submit" class="nature-btn">CONNEXION</button>
                
                <!-- Lien pour Créer un compte sur l'autre page -->
                <div class="auth-switch">
                    <p><a href="signup.html">Créer un profil étudiant</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="scripts/firebase-config.js"></script>
    <script type="module" src="scripts/auth.js"></script>
</body>
</html>
