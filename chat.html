<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Salon de discussion général — BTS CIEL, Lycée Europe.">
    <title>Tchat — BTS CIEL</title>
    <link rel="stylesheet" href="styles/nature-theme.css">
</head>
<body class="chat-body">

    <div class="chat-layout">

        <!-- Topbar -->
        <header class="chat-topbar">
            <div class="chat-topbar-left">
                <a href="hub.html" class="chat-back-link" title="Retour au Hub">
                    ←
                </a>
                <div>
                    <div class="chat-topbar-title">Salon Général</div>
                </div>
                <span style="font-size:0.78rem; font-weight:600; padding:0.2rem 0.65rem; border-radius:9999px; background:var(--accent-light); color:var(--accent-hover); border:1px solid rgba(90,138,114,.2);">BTS CIEL</span>
            </div>

            <div class="chat-topbar-right">
                <div class="chat-status">
                    <div class="chat-status-dot"></div>
                    <span id="userEmailDisplay" style="font-size:0.825rem; color:var(--text-secondary);">Chargement…</span>
                </div>
                <button id="logoutBtn" class="btn-danger" style="background:transparent; border:1px solid rgba(220,38,38,.25); color:var(--danger); padding:.45rem .875rem; border-radius:var(--radius-md); cursor:pointer; font-family:inherit; font-size:0.8rem; font-weight:600; transition:all .3s ease-in-out;">
                    Déconnexion
                </button>
            </div>
        </header>

        <!-- Room -->
        <main class="chat-room-container">

            <!-- En-tête du salon -->
            <div class="chat-header">
                <h2>💬 Salon Général</h2>
                <p>Discussion en temps réel avec la promotion BTS CIEL</p>
            </div>

            <!-- Messages -->
            <div class="messages-list" id="messagesList">
                <div class="message system">Synchronisation en cours…</div>
            </div>

            <!-- Zone de saisie -->
            <form id="messageForm" class="chat-form">
                <input
                    type="text"
                    id="messageInput"
                    class="nature-input"
                    placeholder="Écrire un message…"
                    required
                    autocomplete="off"
                    aria-label="Zone de saisie du message"
                >
                <button type="submit" class="chat-send-btn" id="sendBtn" title="Envoyer" aria-label="Envoyer le message">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </form>

        </main>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="scripts/firebase-config.js"></script>
    <script type="module" src="scripts/chat.js"></script>
</body>
</html>
