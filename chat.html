<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chat – Lycée Europe</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(circle at top left, #4f46e5, #0ea5e9, #020617);
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header.global-header {
      width: 100%;
      padding: 12px 20px;
      background: rgba(15,23,42,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header img.logo {
      height: 44px;
      border-radius: 8px;
    }

    header nav {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    header nav a {
      color: #e5e7eb;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: 0.2s;
      opacity: 0.9;
    }

    header nav a:hover {
      color: #93c5fd;
      opacity: 1;
    }

    header img.home-btn {
      height: 38px;
      cursor: pointer;
      transition: 0.2s;
    }

    header img.home-btn:hover {
      transform: scale(1.05);
    }

    /* LAYOUT PRINCIPAL */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 16px;
    }

    /* ÉCRAN D’ACCÈS */
    #access-screen {
      width: 100%;
      max-width: 420px;
      background: rgba(15,23,42,0.8);
      padding: 26px;
      border-radius: 20px;
      border: 1px solid rgba(148,163,184,0.4);
      backdrop-filter: blur(18px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    #access-screen h2 {
      margin-bottom: 8px;
      font-size: 20px;
      font-weight: 600;
    }

    #access-screen p {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 14px;
    }

    #access-screen input,
    #access-screen button {
      width: 100%;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      padding: 11px 14px;
      font-size: 14px;
      background: rgba(15, 23, 42, 0.8);
      color: #e5e7eb;
      margin-top: 10px;
      outline: none;
    }

    #access-screen input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 1px rgba(96,165,250,0.4);
    }

    #access-screen button {
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      border: none;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(37,99,235,0.55);
      transition: 0.18s;
    }

    #access-screen button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 26px rgba(37,99,235,0.7);
    }

    #error {
      margin-top: 10px;
      color: #f87171;
      font-size: 13px;
      min-height: 18px;
    }

    /* CHAT */
    .chat-app {
      width: 100%;
      max-width: 960px;
      height: 78vh;
      max-height: 720px;
      background: rgba(15,23,42,0.75);
      border-radius: 22px;
      border: 1px solid rgba(148,163,184,0.35);
      backdrop-filter: blur(22px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(15,23,42,0.85);
    }

    .chat-header {
      padding: 14px 18px;
      font-size: 17px;
      font-weight: 600;
      border-bottom: 1px solid rgba(148,163,184,0.3);
      background: linear-gradient(to right, rgba(15,23,42,0.96), rgba(30,64,175,0.7));
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header .pseudo-display {
      font-size: 12px;
      color: #cbd5f5;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .message-row {
      display: flex;
      gap: 10px;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #38bdf8, #1d4ed8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 13px;
      color: white;
      flex-shrink: 0;
    }

    .message-card {
      background: rgba(15,23,42,0.9);
      border-radius: 16px;
      padding: 8px 12px;
      border: 1px solid rgba(148,163,184,0.4);
      max-width: 80%;
      word-wrap: break-word;
      font-size: 14px;
    }

    .message-header {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 3px;
    }

    .message-header strong {
      color: #e5e7eb;
    }

    .message-body {
      font-size: 14px;
      color: #e5e7eb;
    }

    /* BARRE STYLE GPT EN BAS */
    .smart-input-bar {
      display: flex;
      align-items: center;
      background: rgba(15,23,42,0.95);
      border-top: 1px solid rgba(148,163,184,0.35);
      padding: 10px 10px;
      gap: 8px;
    }

    .smart-input-inner {
      display: flex;
      align-items: center;
      background: rgba(15,23,42,0.9);
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.5);
      padding: 8px 12px;
      gap: 10px;
      flex: 1;
    }

    .smart-input-inner input {
      flex: 1;
      background: transparent;
      border: none;
      color: #e5e7eb;
      font-size: 14px;
      outline: none;
      min-width: 0;
    }

    .smart-input-inner input::placeholder {
      color: #6b7280;
    }

    .right-tools {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mode {
      font-size: 11px;
      color: #93c5fd;
      background: rgba(30,64,175,0.4);
      padding: 3px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
    }

    .icon-btn svg {
      width: 17px;
      height: 17px;
      fill: #e5e7eb;
      opacity: 0.85;
      transition: 0.18s;
    }

    .icon-btn:hover svg {
      opacity: 1;
      transform: scale(1.1);
    }

    /* BOUTON ENVOYER (FLÈCHE) */
    #send-btn {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      box-shadow: 0 4px 14px rgba(37,99,235,0.5);
    }

    #send-btn svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    footer {
      text-align: center;
      padding: 12px;
      font-size: 12px;
      color: #cbd5e1;
      background: rgba(15,23,42,0.7);
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    /* RESPONSIVE MOBILE */
    @media (max-width: 768px) {
      header.global-header {
        padding: 10px 12px;
      }

      header nav {
        display: none;
      }

      header img.logo {
        height: 38px;
      }

      main {
        padding: 16px 8px;
      }

      .chat-app {
        height: calc(100vh - 140px);
        max-height: none;
        border-radius: 16px;
      }

      .chat-header {
        padding: 10px 12px;
        font-size: 15px;
      }

      #messages {
        padding: 10px;
      }

      .smart-input-bar {
        padding: 8px 6px;
      }

      .smart-input-inner {
        padding: 6px 10px;
      }

      .mode {
        display: none;
      }
    }
  </style>
</head>

<body>

<header class="global-header">
  <div class="left">
    <img src="logo.png" class="logo" alt="Logo Lycée Europe">
    <nav>
      <a href="index.html">Accueil</a>
      <a href="#">Chat</a>
      <a href="#">Contact</a>
      <a href="#">Infos</a>
    </nav>
  </div>
  <img src="bouton.png" class="home-btn" alt="Accueil" onclick="window.location='index.html'">
</header>

<main>
  <div id="access-screen">
    <h2>Connexion au chat</h2>
    <p>Entrez le code d’accès et choisissez votre pseudo.</p>
    <input type="password" id="access-code" placeholder="Code d’accès">
    <input type="text" id="pseudo" placeholder="Votre pseudo">
    <button onclick="enterChat()">Entrer</button>
    <p id="error"></p>
  </div>
</main>

<footer>
  © 2026 Lycée Europe — Tous droits réservés
</footer>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAJxJpHd_gJweQs5nQHfrV5C5WPEKZ_F90",
  authDomain: "lycee-europe.firebaseapp.com",
  projectId: "lycee-europe"
});

const db = firebase.firestore();
const messagesRef = db.collection("messages");

let ACCESS_CODE = null;
let currentPseudo = null;

/* Charger le code d’accès */
async function loadAccessCode() {
  const doc = await db.collection("config").doc("access").get();
  ACCESS_CODE = doc.data().code;
}

/* Connexion */
async function enterChat() {
  const code = document.getElementById("access-code").value.trim();
  const pseudo = document.getElementById("pseudo").value.trim();
  const error = document.getElementById("error");

  if (!code || !pseudo) {
    error.textContent = "Veuillez remplir tous les champs.";
    return;
  }

  await loadAccessCode();

  if (code !== ACCESS_CODE) {
    error.textContent = "Code incorrect.";
    return;
  }

  currentPseudo = pseudo;
  document.getElementById("access-screen").remove();
  loadChatUI();
  listenMessages();
}

/* Interface du chat */
function loadChatUI() {
  const main = document.querySelector("main");

  const app = document.createElement("div");
  app.className = "chat-app";

  app.innerHTML = `
    <div class="chat-header">
      <div>💬 Chat – Lycée Europe</div>
      <div class="pseudo-display">Connecté en tant que : ${currentPseudo}</div>
    </div>

    <div id="messages"></div>

    <div class="smart-input-bar">
      <div class="smart-input-inner">
        <input type="text" id="message" placeholder="Demandez ce que vous voulez">
        <div class="right-tools">
          <span class="mode">Chat (Lycée)</span>
          <button class="icon-btn" title="Pièce jointe (désactivé)">
            <svg viewBox="0 0 24 24">
              <path d="M16.5 6.5l-6.8 6.8a2.5 2.5 0 11-3.5-3.5l7.4-7.4a4 4 0 115.7 5.7l-7.9 7.9a5.5 5.5 0 11-7.8-7.8l7.1-7.1"/>
            </svg>
          </button>
        </div>
      </div>
      <button class="icon-btn" id="send-btn" title="Envoyer">
        <svg viewBox="0 0 24 24">
          <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
        </svg>
      </button>
    </div>
  `;

  main.appendChild(app);

  const input = document.getElementById("message");
  const sendBtn = document.getElementById("send-btn");

  input.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener("click", sendMessage);
}

/* Écoute des messages */
function listenMessages() {
  messagesRef.orderBy("timestamp").onSnapshot(snapshot => {
    const messagesDiv = document.getElementById("messages");
    if (!messagesDiv) return;

    messagesDiv.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();
      const row = document.createElement("div");
      row.className = "message-row";

      const timeText = data.timestamp
        ? new Date(data.timestamp.toDate()).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})
        : "—";

      row.innerHTML = `
        <div class="avatar">${data.pseudo.charAt(0).toUpperCase()}</div>
        <div class="message-card">
          <div class="message-header">
            <strong>${data.pseudo}</strong> • <span>${timeText}</span>
          </div>
          <div class="message-body">${data.message}</div>
        </div>
      `;

      messagesDiv.appendChild(row);
    });

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}

/* Envoi d’un message */
async function sendMessage() {
  const input = document.getElementById("message");
  if (!input) return;

  const text = input.value.trim();
  if (!text) return;

  await messagesRef.add({
    pseudo: currentPseudo,
    message: text,
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  });

  input.value = "";
}
</script>

</body>
</html>
