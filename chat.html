<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chat – Lycée Europe</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top left, #4f46e5, #0ea5e9, #020617);
      color: #e5e7eb;
    }

    /* ÉCRAN D’ACCÈS */
    #access-screen {
      width: 100%;
      max-width: 420px;
      background: rgba(15,23,42,0.7);
      padding: 30px;
      border-radius: 20px;
      border: 1px solid rgba(148,163,184,0.4);
      backdrop-filter: blur(18px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    #access-screen h2 {
      margin-bottom: 10px;
      font-size: 22px;
      font-weight: 600;
    }

    #access-screen p {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 15px;
    }

    input, button {
      width: 100%;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      padding: 12px 16px;
      font-size: 14px;
      background: rgba(15, 23, 42, 0.7);
      color: #e5e7eb;
      margin-top: 10px;
      outline: none;
    }

    button {
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      border: none;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(37,99,235,0.55);
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(37,99,235,0.7);
    }

    #error {
      margin-top: 10px;
      color: #f87171;
      font-size: 14px;
    }

    /* CHAT APP */
    .chat-app {
      width: 100%;
      max-width: 900px;
      height: 90vh;
      background: rgba(15,23,42,0.65);
      border-radius: 24px;
      border: 1px solid rgba(148,163,184,0.35);
      backdrop-filter: blur(22px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(15,23,42,0.85);
    }

    header {
      padding: 16px 24px;
      font-size: 20px;
      font-weight: 600;
      border-bottom: 1px solid rgba(148,163,184,0.3);
      background: linear-gradient(to right, rgba(15,23,42,0.9), rgba(30,64,175,0.7));
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header .pseudo-display {
      font-size: 13px;
      color: #cbd5f5;
    }

    header .right-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header a.home-btn {
      padding: 8px 16px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      color: #e5e7eb;
      text-decoration: none;
      font-size: 14px;
      backdrop-filter: blur(10px);
      transition: 0.2s;
    }

    header a.home-btn:hover {
      background: rgba(255,255,255,0.25);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message-row {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.22s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #38bdf8, #1d4ed8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: white;
      flex-shrink: 0;
    }

    .message-card {
      background: rgba(15,23,42,0.78);
      border-radius: 18px;
      padding: 10px 14px;
      border: 1px solid rgba(148,163,184,0.4);
      backdrop-filter: blur(14px);
      max-width: 80%;
    }

    .message-header {
      display: flex;
      gap: 6px;
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 2px;
    }

    .message-body {
      font-size: 14px;
      color: #d1d5db;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    #bottom-bar {
      padding: 14px 20px;
      background: rgba(15,23,42,0.9);
      border-top: 1px solid rgba(148,163,184,0.3);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #bottom-bar input {
      flex: 1;
      margin: 0;
    }

    #bottom-bar button {
      width: auto;
      padding: 12px 20px;
      border-radius: 999px;
    }

    @media (max-width: 700px) {
      .chat-app {
        height: 100vh;
        border-radius: 0;
        border: none;
      }
    }
  </style>
</head>
<body>

<!-- ÉCRAN D’ACCÈS -->
<div id="access-screen">
  <h2>Connexion au chat</h2>
  <p>Entrez le code d’accès et choisissez votre pseudo.</p>

  <input type="password" id="access-code" placeholder="Code d’accès">
  <input type="text" id="pseudo" placeholder="Votre pseudo">

  <button id="access-btn" onclick="enterChat()">Entrer</button>

  <p id="error"></p>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
  // === CONFIG FIREBASE ===
  const firebaseConfig = {
    apiKey: "AIzaSyAJxJpHd_gJweQs5nQHfrV5C5WPEKZ_F90",
    authDomain: "lycee-europe.firebaseapp.com",
    projectId: "lycee-europe"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let ACCESS_CODE = null;
  let messagesRef = db.collection("messages");
  let unsubscribe = null;
  let currentPseudo = null;

  async function loadAccessCode() {
    const doc = await db.collection("config").doc("access").get();
    if (!doc.exists) {
      console.error("Document /config/access introuvable");
      throw new Error("Code d'accès non configuré");
    }
    ACCESS_CODE = doc.data().code;
  }

  async function enterChat() {
    const code = document.getElementById("access-code").value.trim();
    const pseudo = document.getElementById("pseudo").value.trim();
    const error = document.getElementById("error");

    error.textContent = "";

    if (!code || !pseudo) {
      error.textContent = "Veuillez remplir tous les champs.";
      return;
    }

    try {
      await loadAccessCode();
    } catch (e) {
      error.textContent = "Erreur de configuration du code d’accès.";
      return;
    }

    if (code !== ACCESS_CODE) {
      error.textContent = "Code incorrect.";
      return;
    }

    currentPseudo = pseudo;
    localStorage.setItem("pseudo", pseudo);

    document.getElementById("access-screen").remove();

    createChatUI();
    startListening();
  }

  function createChatUI() {
    const app = document.createElement("div");
    app.className = "chat-app";

    app.innerHTML = `
      <header>
        <div>💬 Chat – Lycée Europe</div>
        <div class="right-header">
          <span class="pseudo-display">Connecté en tant que : ${escapeHtml(currentPseudo)}</span>
          <a href="index.html" class="home-btn">Accueil</a>
        </div>
      </header>

      <div id="messages"></div>

      <div id="bottom-bar">
        <input type="text" id="message" placeholder="Votre message… (Entrée pour envoyer)">
        <button onclick="sendMessage()">Envoyer</button>
      </div>
    `;

    document.body.appendChild(app);

    const messageInput = document.getElementById("message");
    messageInput.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
      }
    });
    messageInput.focus();
  }

  function startListening() {
    unsubscribe = messagesRef.orderBy("timestamp").onSnapshot(snapshot => {
      const messagesDiv = document.getElementById("messages");
      if (!messagesDiv) return;

      messagesDiv.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();
        const pseudo = data.pseudo || "Anonyme";
        const message = data.message || "";
        const time = data.timestamp?.toDate().toLocaleTimeString("fr-FR", {
          hour: "2-digit",
          minute: "2-digit"
        }) || "";

        const row = document.createElement("div");
        row.className = "message-row";

        row.innerHTML = `
          <div class="avatar">${escapeHtml(pseudo.charAt(0).toUpperCase())}</div>
          <div class="message-card">
            <div class="message-header">
              <span>${escapeHtml(pseudo)}</span>
              <span>${time}</span>
            </div>
            <div class="message-body">${escapeHtml(message)}</div>
          </div>
        `;

        messagesDiv.appendChild(row);
      });

      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }, err => {
      console.error("Erreur snapshot messages:", err);
    });
  }

  async function sendMessage() {
    if (!currentPseudo) return;

    const input = document.getElementById("message");
    if (!input) return;

    const text = input.value.trim();
    if (!text) return;

    try {
      await messagesRef.add({
        pseudo: currentPseudo,
        message: text,
        timestamp: new Date()
      });
      input.value = "";
    } catch (e) {
      console.error("Erreur envoi message:", e);
    }
  }

  function escapeHtml(text) {
    if (!text) return "";
    const map = {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    };
    return text.replace(/[&<>"']/g, m => map[m] || m);
  }
</script>

</body>
</html>
