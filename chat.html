<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat – Lycée de l'Europe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .chat-container { background: rgba(15,23,42,0.75); border-radius: 20px; padding: 20px; height: 60vh; display: flex; flex-direction: column; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.15); }
        #messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .message-row { display: flex; gap: 10px; color: white; }
        .avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg,#38bdf8,#1d4ed8); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .message-card { background: rgba(255,255,255,0.08); padding: 10px; border-radius: 12px; max-width: 80%; border: 1px solid rgba(255,255,255,0.1); }
        .smart-input-bar { display: flex; gap: 10px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 999px; }
        .smart-input-bar input { flex: 1; background: transparent; border: none; color: white; outline: none; }
        #send-btn { background: #38bdf8; border: none; border-radius: 50%; width: 35px; height: 35px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1>Lycée de l'Europe – Dunkerque</h1>
        <p>Chat Public 💬</p>
        <a href="index.html" style="color:white; text-decoration:none;"><i class="fas fa-house"></i> Accueil</a>
    </header>

    <div class="container">
        <main>
            <article class="card">
                <div id="pseudo-screen">
                    <h2>Entrer dans le Chat</h2>
                    <input type="text" id="pseudo" placeholder="Votre pseudo" style="padding:10px; border-radius:5px; width:100%;">
                    <button onclick="enterChat()" style="margin-top:10px; padding:10px; width:100%; background:#38bdf8; color:white; border:none; border-radius:5px; cursor:pointer;">Entrer</button>
                </div>
                
                <div id="chat-ui" style="display:none;">
                    <div class="chat-container">
                        <div id="messages"></div>
                        <div class="smart-input-bar">
                            <input type="text" id="message" placeholder="Votre message...">
                            <button id="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </article>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyCpo7up--nfVG4zj_Zeu4kB7pr34ad4ceM",
            authDomain: "lycee-europe-private.firebaseapp.com",
            projectId: "lycee-europe-private",
            storageBucket: "lycee-europe-private.firebasestorage.app",
            messagingSenderId: "259168134432",
            appId: "1:259168134432:web:470f5536d9305b4cf86345"
        });
        const db = firebase.firestore();
        let currentPseudo = null;

        function enterChat() {
            const p = document.getElementById("pseudo").value.trim();
            if(!p) return;
            currentPseudo = p;
            document.getElementById("pseudo-screen").style.display = "none";
            document.getElementById("chat-ui").style.display = "block";
            listenMessages();
        }

        function listenMessages() {
            db.collection("messages").orderBy("timestamp").onSnapshot(snap => {
                const div = document.getElementById("messages");
                div.innerHTML = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    const row = document.createElement("div");
                    row.className = "message-row";
                    row.innerHTML = `<div class="avatar">${data.pseudo[0].toUpperCase()}</div><div class="message-card"><strong>${data.pseudo}</strong><br>${data.message}</div>`;
                    div.appendChild(row);
                });
                div.scrollTop = div.scrollHeight;
            });
        }

        async function sendMessage() {
            const input = document.getElementById("message");
            if(!input.value.trim()) return;
            await db.collection("messages").add({
                pseudo: currentPseudo,
                message: input.value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = "";
        }
    </script>
</body>
</html>
