<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tchat BTS - Lycée Europe</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="chat-body">
    <nav class="navbar chat-navbar">
        <div class="nav-brand">
            <a href="index.html" style="color: inherit; text-decoration: none;">Lycée Europe</a> 
            <span class="badge">Chat</span>
        </div>
        <div class="nav-links">
            <span id="userEmailDisplay" class="user-email">Non connecté</span>
            <button id="logoutBtn" class="btn btn-outline btn-small">Déconnexion</button>
        </div>
    </nav>

    <div class="chat-container">
        <!-- Sidebar: Liste des salons potentiels -->
        <aside class="chat-sidebar glass-card">
            <h3>Salons</h3>
            <ul class="room-list">
                <li class="active"># général</li>
                <li># dev-web</li>
                <li># réseau</li>
                <li># entraide</li>
            </ul>
        </aside>

        <!-- Main chat area -->
        <main class="chat-main glass-card">
            <div class="chat-header">
                <h2># général</h2>
                <p>Tchat ouvert pour tous les étudiants du BTS.</p>
            </div>
            
            <div class="chat-messages" id="messagesList">
                <!-- Les messages s'afficheront ici dynamiquement --
                <div class="message system">Chargement des messages...</div>
            </div>

            <form id="messageForm" class="message-form">
                <input type="text" id="messageInput" placeholder="Écrivez votre message..." required autocomplete="off">
                <button type="submit" class="btn btn-primary" id="sendBtn">Envoyer</button>
            </form>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="scripts/firebase-config.js"></script>
    <script type="module" src="scripts/chat.js"></script>
</body>
</html>
