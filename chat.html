<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chat – Lycée Europe</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top left, #4f46e5, #0ea5e9, #020617);
      color: #e5e7eb;
    }

    /* ÉCRAN D’ACCÈS */
    #access-screen {
      width: 100%;
      max-width: 420px;
      background: rgba(15,23,42,0.7);
      padding: 30px;
      border-radius: 20px;
      border: 1px solid rgba(148,163,184,0.4);
      backdrop-filter: blur(18px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    #access-screen h2 {
      margin-bottom: 10px;
      font-size: 22px;
      font-weight: 600;
    }

    #access-screen p {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 15px;
    }

    input, button {
      width: 100%;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      padding: 12px 16px;
      font-size: 14px;
      background: rgba(15, 23, 42, 0.7);
      color: #e5e7eb;
      margin-top: 10px;
      outline: none;
    }

    button {
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      border: none;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(37,99,235,0.55);
    }

    #error {
      margin-top: 10px;
      color: #f87171;
      font-size: 14px;
    }

    /* CHAT (généré dynamiquement) */
    .chat-app {
      width: 100%;
      max-width: 900px;
      height: 90vh;
      background: rgba(15,23,42,0.65);
      border-radius: 24px;
      border: 1px solid rgba(148,163,184,0.35);
      backdrop-filter: blur(22px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(15,23,42,0.85);
    }

    header {
      padding: 16px 24px;
      font-size: 20px;
      font-weight: 600;
      border-bottom: 1px solid rgba(148,163,184,0.3);
      background: linear-gradient(to right, rgba(15,23,42,0.9), rgba(30,64,175,0.7));
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header span.pseudo-display {
      font-size: 13px;
      color: #cbd5f5;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message-row {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.22s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #38bdf8, #1d4ed8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: white;
      flex-shrink: 0;
    }

    .message-card {
      background: rgba(15,23,42,0.78);
      border-radius: 18px;
      padding: 10px 14px;
      border: 1px solid rgba(148,163,184,0.4);
      backdrop-filter: blur(14px);
      max-width: 80%;
    }

    .message-header {
      display: flex;
      gap: 6px;
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 2px;
    }

    .message-body {
      font-size: 14px;
      color: #d1d5db;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    #bottom-bar {
      padding: 14px 20px;
      background: rgba(15,23,42,0.9);
      border-top: 1px solid rgba(148,163,184,0.3);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #bottom-bar input {
      flex: 1;
      margin: 0;
    }

    #bottom-bar button {
      width: auto;
      padding: 12px 20px;
      border-radius: 999px;
    }
  </style>
</head>
<body>

<!-- ÉCRAN D’ACCÈS -->
<div id="access-screen">
  <h2>Connexion au chat</h2>
  <p>Entrez le code d’accès et choisissez votre pseudo.</p>

  <input type="password" id="access-code" placeholder="Code d’accès">
  <input type="text" id="pseudo" placeholder="Votre pseudo">

  <button onclick="enterChat()">Entrer</button>

  <p id="error"></p>
</div>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
  const ACCESS_CODE = "C1EL2025";
  let db = null;
  let messagesRef = null;
  let unsubscribe = null;
  let currentPseudo = null;

  function enterChat() {
    const code = document.getElementById("access-code").value.trim();
    const pseudo = document.getElementById("pseudo").value.trim();
    const error = document.getElementById("error");

    if (!code || !pseudo) {
      error.textContent = "Veuillez remplir tous les champs.";
      return;
    }

    if (code !== ACCESS_CODE) {
      error.textContent = "Code incorrect.";
      return;
    }

    currentPseudo = pseudo;
    localStorage.setItem("pseudo", pseudo);

    document.getElementById("access-screen").remove();

    loadChatUI();
    initFirebase();
    startListening();
  }

  function loadChatUI() {
    const app = document.createElement("div");
    app.className = "chat-app";

    app.innerHTML = `
      <header>
        <div>💬 Chat – Lycée Europe</div>
        <span class="pseudo-display">Connecté en tant que : ${currentPseudo}</span>
      </header>

      <div id="messages"></div>

      <div id="bottom-bar">
        <input type="text" id="message" placeholder="Votre message… (Entrée pour envoyer)">
        <button onclick="sendMessage()">Envoyer</button>
      </div>
    `;

    document.body.appendChild(app);

    document.getElementById("message").addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
      }
    });
  }

  function initFirebase() {
    firebase.initializeApp({
      apiKey: "AIzaSyAJxJpHd_gJweQs5nQHfrV5C5WPEKZ_F90",
      authDomain: "lycee-europe.firebaseapp.com",
      projectId: "lycee-europe"
    });

    db = firebase.firestore();
    messagesRef = db.collection("messages");
  }

  function startListening() {
    unsubscribe = messagesRef.orderBy("timestamp").onSnapshot(snapshot => {
      const messagesDiv = document.getElementById("messages");
      messagesDiv.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();
        const pseudo = data.pseudo;
        const message = data.message;
        const time = data.timestamp.toDate().toLocaleTimeString("fr-FR", {
          hour: "2-digit",
          minute: "2-digit"
        });

        const row = document.createElement("div");
        row.className = "message-row";

        row.innerHTML = `
          <div class="avatar">${pseudo.charAt(0).toUpperCase()}</div>
          <div class="message-card">
            <div class="message-header">
              <span>${pseudo}</span>
              <span>${time}</span>
            </div>
            <div class="message-body">${message}</div>
          </div>
        `;

        messagesDiv.appendChild(row);
      });

      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
  }

  async function sendMessage() {
    const input = document.getElementById("message");
    const text = input.value.trim();
    if (!text) return;

    await messagesRef.add({
      pseudo: currentPseudo,
      message: text,
      timestamp: new Date()
    });

    input.value = "";
  }
</script>

</body>
</html>
