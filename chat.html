<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Public – Lycée de l'Europe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* MODERN CHAT STYLES - Discord/Slack inspired */
        body {
            background: var(--secondary);
            overflow: hidden;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-4) var(--space-6);
            background: var(--white);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        body.dark-mode header {
            background: var(--gray-800);
            border-bottom-color: var(--border);
        }

        .header-left h1 {
            font-size: 1.25rem;
            margin: 0;
            color: var(--primary);
        }

        .header-left p {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin: 0;
        }

        .header-right {
            display: flex;
            gap: var(--space-3);
            align-items: center;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-4);
            background: var(--gray-100);
            color: var(--text-dark);
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.875rem;
            transition: var(--transition-fast);
        }

        body.dark-mode .home-link {
            background: var(--gray-700);
            color: var(--text-dark);
        }

        .home-link:hover {
            background: var(--primary-light);
            color: var(--white);
        }

        .chat-layout {
            display: grid;
            grid-template-columns: 260px 1fr 200px;
            height: calc(100vh - 80px);
            max-width: 1400px;
            margin: 0 auto;
            gap: 1px;
            background: var(--border);
        }

        /* SIDEBAR - Channels */
        .sidebar {
            background: var(--white);
            padding: var(--space-4);
            overflow-y: auto;
        }

        body.dark-mode .sidebar {
            background: var(--gray-800);
        }

        .channel-list {
            list-style: none;
        }

        .channel-item {
            padding: var(--space-3);
            margin-bottom: var(--space-2);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: var(--space-2);
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition-fast);
        }

        .channel-item:hover,
        .channel-item.active {
            background: var(--gray-100);
            color: var(--primary);
        }

        body.dark-mode .channel-item:hover,
        body.dark-mode .channel-item.active {
            background: var(--gray-700);
        }

        .channel-item i {
            font-size: 1.125rem;
        }

        /* MAIN CHAT AREA */
        .chat-main {
            background: var(--secondary);
            display: flex;
            flex-direction: column;
        }

        body.dark-mode .chat-main {
            background: var(--gray-900);
        }

        .chat-header {
            padding: var(--space-4) var(--space-6);
            border-bottom: 1px solid var(--border);
            background: var(--white);
        }

        body.dark-mode .chat-header {
            background: var(--gray-800);
        }

        .chat-header h2 {
            margin: 0;
            font-size: 1.125rem;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .chat-header p {
            margin: var(--space-1) 0 0 0;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-6);
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
        }

        /* Scrollbar styling */
        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 4px;
        }

        body.dark-mode .messages-container::-webkit-scrollbar-thumb {
            background: var(--gray-700);
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: var(--gray-400);
        }

        .message {
            display: flex;
            gap: var(--space-3);
            padding: var(--space-2);
            border-radius: 8px;
            transition: var(--transition-fast);
            animation: fadeInUp 0.3s ease-out;
        }

        .message:hover {
            background: var(--gray-50);
        }

        body.dark-mode .message:hover {
            background: var(--gray-800);
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            background: var(--primary-light);
            color: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
            min-width: 0;
        }

        .message-header {
            display: flex;
            align-items: baseline;
            gap: var(--space-2);
            margin-bottom: var(--space-1);
        }

        .message-author {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .message-text {
            color: var(--text-dark);
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        /* MESSAGE INPUT */
        .message-input-container {
            padding: var(--space-4) var(--space-6);
            background: var(--white);
            border-top: 1px solid var(--border);
        }

        body.dark-mode .message-input-container {
            background: var(--gray-800);
        }

        .message-input-wrapper {
            display: flex;
            gap: var(--space-3);
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            padding: var(--space-3) var(--space-4);
            background: var(--gray-100);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-dark);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            transition: var(--transition-fast);
        }

        body.dark-mode .message-input {
            background: var(--gray-700);
            border-color: var(--border);
            color: var(--text-dark);
        }

        .message-input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .message-input::placeholder {
            color: var(--text-muted);
        }

        .send-button {
            width: 44px;
            height: 44px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.125rem;
            transition: var(--transition-smooth);
            flex-shrink: 0;
        }

        .send-button:hover {
            background: var(--primary-light);
            transform: scale(1.05);
        }

        .send-button:active {
            transform: scale(0.95);
        }

        /* MEMBERS SIDEBAR */
        .members-sidebar {
            background: var(--white);
            padding: var(--space-4);
            overflow-y: auto;
        }

        body.dark-mode .members-sidebar {
            background: var(--gray-800);
        }

        .members-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: var(--space-4);
        }

        .member-list {
            list-style: none;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2);
            margin-bottom: var(--space-2);
            border-radius: 6px;
            transition: var(--transition-fast);
        }

        .member-item:hover {
            background: var(--gray-100);
        }

        body.dark-mode .member-item:hover {
            background: var(--gray-700);
        }

        .member-avatar {
            width: 28px;
            height: 28px;
            background: var(--accent);
            color: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.75rem;
            position: relative;
        }

        .member-avatar::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 10px;
            height: 10px;
            background: var(--accent);
            border: 2px solid var(--white);
            border-radius: 50%;
        }

        body.dark-mode .member-avatar::after {
            border-color: var(--gray-800);
        }

        .member-name {
            font-size: 0.875rem;
            color: var(--text-dark);
            font-weight: 500;
        }

        /* PSEUDO SCREEN */
        #pseudo-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        #pseudo-screen.hidden {
            display: none;
        }

        .pseudo-modal {
            background: var(--white);
            padding: var(--space-8);
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            box-shadow: var(--shadow-xl);
            text-align: center;
        }

        body.dark-mode .pseudo-modal {
            background: var(--gray-800);
        }

        .pseudo-modal h2 {
            color: var(--primary);
            margin-bottom: var(--space-4);
        }

        .pseudo-modal p {
            color: var(--text-muted);
            margin-bottom: var(--space-6);
        }

        .pseudo-input {
            width: 100%;
            padding: var(--space-4);
            background: var(--gray-100);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-dark);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            text-align: center;
            margin-bottom: var(--space-4);
            transition: var(--transition-fast);
        }

        body.dark-mode .pseudo-input {
            background: var(--gray-700);
            border-color: var(--border);
            color: var(--text-dark);
        }

        .pseudo-input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .pseudo-button {
            width: 100%;
            padding: var(--space-4);
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .pseudo-button:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .chat-layout {
                grid-template-columns: 1fr;
            }

            .sidebar,
            .members-sidebar {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .messages-container {
                padding: var(--space-4);
            }

            .message-input-container {
                padding: var(--space-3);
            }
        }
    </style>
</head>

<body>

<header>
    <div class="header-left">
        <h1><i class="fas fa-comments"></i> Chat Public</h1>
        <p>Lycée de l'Europe</p>
    </div>
    <div class="header-right">
        <a href="index.html" class="home-link">
            <i class="fas fa-home"></i> Retour
        </a>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
            <i class="fas fa-moon" id="theme-icon"></i>
        </button>
    </div>
</header>

<div class="chat-layout">
    <!-- SIDEBAR - Channels -->
    <div class="sidebar">
        <h3 style="margin-bottom: var(--space-4); color: var(--text-dark);">Canaux</h3>
        <ul class="channel-list">
            <li class="channel-item active">
                <i class="fas fa-hashtag"></i> général
            </li>
            <li class="channel-item">
                <i class="fas fa-hashtag"></i> entraide
            </li>
            <li class="channel-item">
                <i class="fas fa-hashtag"></i> événements
            </li>
            <li class="channel-item">
                <i class="fas fa-hashtag"></i> projets
            </li>
        </ul>

        <h3 style="margin: var(--space-6) 0 var(--space-4); color: var(--text-dark);">Navigation</h3>
        <ul class="channel-list">
            <li class="channel-item">
                <a href="le-lycee.html" style="display: flex; align-items: center; gap: var(--space-2); color: inherit; text-decoration: none;">
                    <i class="fas fa-school"></i> Le Lycée
                </a>
            </li>
            <li class="channel-item">
                <a href="formations.html" style="display: flex; align-items: center; gap: var(--space-2); color: inherit; text-decoration: none;">
                    <i class="fas fa-graduation-cap"></i> Formations
                </a>
            </li>
            <li class="channel-item">
                <a href="erasmus.html" style="display: flex; align-items: center; gap: var(--space-2); color: inherit; text-decoration: none;">
                    <i class="fas fa-globe"></i> Erasmus+
                </a>
            </li>
        </ul>
    </div>

    <!-- MAIN CHAT -->
    <div class="chat-main">
        <div class="chat-header">
            <h2><i class="fas fa-hashtag"></i> général</h2>
            <p>Canal de discussion général du lycée</p>
        </div>

        <div class="messages-container" id="messages">
            <!-- Messages will be dynamically added here -->
        </div>

        <div class="message-input-container">
            <div class="message-input-wrapper">
                <textarea 
                    id="message-input" 
                    class="message-input" 
                    placeholder="Envoyer un message à #général..."
                    rows="1"
                ></textarea>
                <button id="send-btn" class="send-button" aria-label="Envoyer">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- MEMBERS SIDEBAR -->
    <div class="members-sidebar">
        <div class="members-title">En ligne — <span id="online-count">0</span></div>
        <ul class="member-list" id="members-list">
            <!-- Members will be dynamically added here -->
        </ul>
    </div>
</div>

<!-- PSEUDO SCREEN -->
<div id="pseudo-screen">
    <div class="pseudo-modal">
        <h2>Rejoindre le chat</h2>
        <p>Choisissez votre nom d'utilisateur pour commencer à discuter</p>
        <input 
            type="text" 
            id="pseudo-input" 
            class="pseudo-input" 
            placeholder="Votre pseudo..."
            maxlength="20"
        >
        <button id="join-btn" class="pseudo-button">Rejoindre</button>
    </div>
</div>

<script src="components.js"></script>
<script>
// MODERN CHAT FUNCTIONALITY
let pseudo = '';
let messages = [];
let onlineUsers = new Set();

// Color palette for avatars
const avatarColors = [
    '#3b82f6', '#10b981', '#f59e0b', '#ef4444', 
    '#8b5cf6', '#ec4899', '#06b6d4', '#84cc16'
];

function getAvatarColor(username) {
    let hash = 0;
    for (let i = 0; i < username.length; i++) {
        hash = username.charCodeAt(i) + ((hash << 5) - hash);
    }
    return avatarColors[Math.abs(hash) % avatarColors.length];
}

function formatTime(date) {
    return date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function renderMessage(msg) {
    const messageDiv = document.createElement('div');
    messageDiv.className = 'message';
    
    const avatarColor = getAvatarColor(msg.author);
    const initials = msg.author.substring(0, 2).toUpperCase();
    
    messageDiv.innerHTML = `
        <div class="message-avatar" style="background: ${avatarColor}">
            ${initials}
        </div>
        <div class="message-content">
            <div class="message-header">
                <span class="message-author">${msg.author}</span>
                <span class="message-time">${formatTime(msg.time)}</span>
            </div>
            <div class="message-text">${escapeHtml(msg.text)}</div>
        </div>
    `;
    
    return messageDiv;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function addMessage(author, text) {
    const msg = {
        author: author,
        text: text,
        time: new Date()
    };
    
    messages.push(msg);
    const messagesContainer = document.getElementById('messages');
    messagesContainer.appendChild(renderMessage(msg));
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

function updateMembersList() {
    const membersList = document.getElementById('members-list');
    const onlineCount = document.getElementById('online-count');
    
    membersList.innerHTML = '';
    onlineCount.textContent = onlineUsers.size;
    
    Array.from(onlineUsers).sort().forEach(username => {
        const li = document.createElement('li');
        li.className = 'member-item';
        
        const avatarColor = getAvatarColor(username);
        const initials = username.substring(0, 2).toUpperCase();
        
        li.innerHTML = `
            <div class="member-avatar" style="background: ${avatarColor}">
                ${initials}
            </div>
            <span class="member-name">${username}</span>
        `;
        
        membersList.appendChild(li);
    });
}

function sendMessage() {
    const input = document.getElementById('message-input');
    const text = input.value.trim();
    
    if (text && pseudo) {
        addMessage(pseudo, text);
        input.value = '';
        input.style.height = 'auto';
    }
}

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    const pseudoScreen = document.getElementById('pseudo-screen');
    const pseudoInput = document.getElementById('pseudo-input');
    const joinBtn = document.getElementById('join-btn');
    const sendBtn = document.getElementById('send-btn');
    const messageInput = document.getElementById('message-input');
    
    // Join chat
    joinBtn.addEventListener('click', () => {
        const username = pseudoInput.value.trim();
        if (username.length >= 2) {
            pseudo = username;
            pseudoScreen.classList.add('hidden');
            onlineUsers.add(pseudo);
            updateMembersList();
            
            // Welcome message
            addMessage('Système', `${pseudo} a rejoint le chat ! 👋`);
        } else {
            alert('Le pseudo doit contenir au moins 2 caractères');
        }
    });
    
    // Send with Enter
    pseudoInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            joinBtn.click();
        }
    });
    
    // Send message
    sendBtn.addEventListener('click', sendMessage);
    
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    
    // Auto-resize textarea
    messageInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
    
    // Add some demo users
    ['Marie', 'Thomas', 'Sophie', 'Lucas'].forEach(name => {
        onlineUsers.add(name);
    });
    updateMembersList();
    
    // Welcome message
    setTimeout(() => {
        if (!pseudo) {
            addMessage('Système', 'Bienvenue sur le chat du Lycée de l\'Europe ! 🎓');
        }
    }, 500);
});
</script>

</body>
</html>
