<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat - Lycée de l'Europe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="app-container">
    <aside>
        <div class="logo"><i class="fas fa-bolt"></i> BTS CIEL</div>
        <nav>
            <ul>
                <li><a href="index.html"><i class="fas fa-home"></i> <span>Accueil</span></a></li>
                <li><a href="chat.html" class="active"><i class="fas fa-comment-dots"></i> <span>Chat</span></a></li>
                <li><a href="chatvip.html"><i class="fas fa-crown" style="color: #fbbf24;"></i> <span>VIP</span></a></li>
            </ul>
        </nav>
    </aside>

    <main>
        <div class="top-bar">
            <h1>Salon Public 💬</h1>
            <div style="font-size:0.8rem; color: #94a3b8;">En ligne</div>
        </div>

        <div id="chat-feed" class="chat-wrapper">
            </div>

        <div class="input-area">
            <div class="capsule">
                <input type="text" id="pseudo-input" placeholder="Pseudo" style="width: 80px; border-right: 1px solid #334155; margin-right: 8px;">
                <input type="text" id="msg-input" placeholder="Votre message...">
                <button class="btn-send" onclick="envoyer()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCpo7up--nfVG4zj_Zeu4kB7pr34ad4ceM",
        authDomain: "lycee-europe-private.firebaseapp.com",
        projectId: "lycee-europe-private",
        storageBucket: "lycee-europe-private.firebasestorage.app",
        messagingSenderId: "259168134432",
        appId: "1:259168134432:web:470f5536d9305b4cf86345"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Gestion du Pseudo
    let myPseudo = localStorage.getItem("chat_pseudo") || "";
    if(myPseudo) document.getElementById("pseudo-input").value = myPseudo;

    // Envoi
    function envoyer() {
        const p = document.getElementById("pseudo-input").value.trim();
        const m = document.getElementById("msg-input").value.trim();
        
        if(p && m) {
            localStorage.setItem("chat_pseudo", p);
            myPseudo = p;
            db.collection("messages").add({
                pseudo: p, message: m,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById("msg-input").value = "";
        }
    }

    // Réception
    db.collection("messages").orderBy("timestamp").onSnapshot(snap => {
        const feed = document.getElementById("chat-feed");
        feed.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            const isMe = d.pseudo === myPseudo;
            
            feed.innerHTML += `
                <div style="${!isMe ? 'margin-bottom:2px' : ''}">
                    ${!isMe ? `<div class="pseudo-label">${d.pseudo}</div>` : ''}
                    <div class="msg ${isMe ? 'me' : ''}">
                        ${!isMe ? `<div class="avatar">${d.pseudo[0].toUpperCase()}</div>` : ''}
                        <div class="bubble">${d.message}</div>
                    </div>
                </div>
            `;
        });
        feed.scrollTop = feed.scrollHeight;
    });

    // Touche Entrée
    document.getElementById("msg-input").addEventListener("keypress", (e) => e.key === "Enter" && envoyer());
</script>

</body>
</html>
