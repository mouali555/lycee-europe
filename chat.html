<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Public - Lycée Europe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-firestore.js"></script>
</head>
<body>

    <div id="pseudo-screen" class="login-overlay">
        <div class="login-box">
            <i class="fas fa-user-astronaut logo-icon" style="font-size: 3rem; margin-bottom: 20px;"></i>
            <h2>Identification</h2>
            <input type="text" id="username-input" placeholder="Votre Pseudo..." maxlength="15">
            <button onclick="enterChat()">Se Connecter</button>
        </div>
    </div>

    <header class="main-header">
        <div class="logo-group">
            <a href="index.html" class="nav-item"><i class="fas fa-arrow-left"></i> Retour</a>
            <h1>Chat Public</h1>
        </div>
        <span class="status-badge">LIVE</span>
    </header>

    <div class="chat-layout">
        <div class="chat-box glass-panel">
            <div id="messages">
                </div>
            
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Tapez votre message ici...">
                <button id="send-btn" class="btn-send"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        // ⚠️⚠️⚠️ COLLE ICI TA CONFIGURATION FIREBASE ORIGINALE ⚠️⚠️⚠️
        // Copie-colle le bloc 'const firebaseConfig = { ... }' depuis ton ancien fichier chat.html ici !
        
        // Initialisation par défaut (à remplacer par la tienne si besoin)
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const messagesRef = db.collection("messages"); // Collection publique

        let currentPseudo = "";

        // Gestion Connexion
        const pseudoScreen = document.getElementById("pseudo-screen");
        const usernameInput = document.getElementById("username-input");

        function enterChat() {
            const pseudo = usernameInput.value.trim();
            if (pseudo) {
                currentPseudo = pseudo;
                pseudoScreen.style.display = "none";
                listenMessages();
            }
        }

        // Envoi avec Entrée
        document.getElementById("message-input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
        document.getElementById("send-btn").addEventListener("click", sendMessage);

        // Envoyer un message
        function sendMessage() {
            const input = document.getElementById("message-input");
            const text = input.value.trim();
            if (text && currentPseudo) {
                messagesRef.add({
                    pseudo: currentPseudo,
                    message: text,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                input.value = "";
            }
        }

        // Écouter les messages
        function listenMessages() {
            const msgDiv = document.getElementById("messages");
            messagesRef.orderBy("timestamp").onSnapshot((snapshot) => {
                msgDiv.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const date = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'}) : '--:--';
                    
                    const div = document.createElement("div");
                    div.className = "message-row";
                    div.innerHTML = `
                        <div class="avatar">${data.pseudo.charAt(0).toUpperCase()}</div>
                        <div class="msg-bubble">
                            <div class="msg-header">
                                <span>${data.pseudo}</span>
                                <small>${date}</small>
                            </div>
                            <div class="msg-text">${data.message}</div>
                        </div>
                    `;
                    msgDiv.appendChild(div);
                });
                msgDiv.scrollTop = msgDiv.scrollHeight;
            });
        }
    </script>
</body>
</html>
