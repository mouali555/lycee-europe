<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Public</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* CSS INTÉGRÉ */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        :root {
            --bg-deep: #0f172a; --bg-gradient: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            --glass: rgba(255, 255, 255, 0.03); --glass-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1); --primary: #38bdf8; --vip-gold: #fbbf24;
            --text-main: #f1f5f9; --text-dim: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg-gradient); color: var(--text-main); font-family: 'Outfit', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .app-container { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
        aside { background: rgba(2, 6, 23, 0.6); backdrop-filter: blur(20px); border-right: 1px solid var(--border); padding: 2rem 1.5rem; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
        .logo { font-size: 1.5rem; font-weight: 700; margin-bottom: 3rem; background: linear-gradient(90deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        nav ul { list-style: none; } nav li { margin-bottom: 0.5rem; }
        nav a { display: flex; align-items: center; gap: 15px; padding: 12px 16px; color: var(--text-dim); text-decoration: none; border-radius: 12px; font-weight: 500; border: 1px solid transparent; }
        nav a:hover, nav a.active { background: var(--glass-hover); color: white; border-color: var(--border); box-shadow: 0 0 15px rgba(56, 189, 248, 0.1); }
        nav a i { width: 25px; text-align: center; }
        main { padding: 2rem 3rem; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        h1 { font-size: 2rem; font-weight: 700; }
        
        /* CSS SPÉCIFIQUE CHAT */
        .chat-window { height: 75vh; display: flex; flex-direction: column; background: rgba(0, 0, 0, 0.2); border-radius: 20px; border: 1px solid var(--border); }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { display: flex; gap: 12px; max-width: 70%; animation: popIn 0.3s ease; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #0f172a; }
        .msg-content { background: rgba(255, 255, 255, 0.05); padding: 10px 15px; border-radius: 12px; font-size: 0.95rem; border: 1px solid var(--border); }
        .msg.me .msg-content { background: rgba(56, 189, 248, 0.15); border-color: rgba(56, 189, 248, 0.3); color: white; }
        .msg-pseudo { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 4px; display: block; }
        .input-zone { padding: 15px; background: rgba(0, 0, 0, 0.3); border-top: 1px solid var(--border); border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; display: flex; gap: 10px; }
        input { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: white; padding: 12px 15px; border-radius: 10px; outline: none; flex: 1; }
        button.send { background: var(--primary); color: #0f172a; border: none; width: 45px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        @keyframes popIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
        @media (max-width: 900px) { .app-container { grid-template-columns: 1fr; } aside { display: none; } }
    </style>
</head>
<body>

<div class="app-container">
    <aside>
        <div class="logo"><i class="fas fa-atom fa-spin"></i> &nbsp; BTS CIEL</div>
        <nav>
            <ul>
                <li><a href="index.html"><i class="fas fa-table-columns"></i> Dashboard</a></li>
                <li><a href="chat.html" class="active"><i class="fas fa-comments"></i> Chat Public</a></li>
                <li><a href="chatvip.html" style="color: var(--vip-gold);"><i class="fas fa-crown"></i> Espace VIP</a></li>
            </ul>
        </nav>
    </aside>

    <main>
        <header>
            <h1>Salon Public</h1>
            <p style="color:var(--text-dim)">#général</p>
        </header>

        <div class="chat-window">
            <div id="messages" class="messages-area"></div>
            <div class="input-zone">
                <input type="text" id="pseudo" placeholder="Pseudo" style="max-width: 150px;">
                <input type="text" id="msg" placeholder="Votre message...">
                <button class="send" onclick="envoyer()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCpo7up--nfVG4zj_Zeu4kB7pr34ad4ceM",
        authDomain: "lycee-europe-private.firebaseapp.com",
        projectId: "lycee-europe-private",
        storageBucket: "lycee-europe-private.firebasestorage.app",
        messagingSenderId: "259168134432",
        appId: "1:259168134432:web:470f5536d9305b4cf86345"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentPseudo = localStorage.getItem("chat_pseudo") || "";
    document.getElementById("pseudo").value = currentPseudo;

    function envoyer() {
        const p = document.getElementById("pseudo").value.trim();
        const m = document.getElementById("msg").value.trim();
        if(!p || !m) return;
        
        localStorage.setItem("chat_pseudo", p);
        currentPseudo = p;
        db.collection("messages").add({
            pseudo: p, message: m,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById("msg").value = "";
    }

    db.collection("messages").orderBy("timestamp").onSnapshot(snap => {
        const div = document.getElementById("messages");
        div.innerHTML = "";
        snap.forEach(doc => {
            const data = doc.data();
            const isMe = data.pseudo === currentPseudo;
            div.innerHTML += `
                <div class="msg ${isMe ? 'me' : ''}">
                    <div class="msg-avatar">${data.pseudo[0].toUpperCase()}</div>
                    <div class="msg-content">
                        <span class="msg-pseudo">${data.pseudo}</span>
                        ${data.message}
                    </div>
                </div>`;
        });
        div.scrollTop = div.scrollHeight;
    });

    document.getElementById("msg").addEventListener("keypress", (e) => e.key === "Enter" && envoyer());
</script>
</body>
</html>
