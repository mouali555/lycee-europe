<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chat – Lycée Europe</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top left, #4f46e5, #0ea5e9, #020617);
      color: #e5e7eb;
    }

    /* APP SHELL */
    .app-shell {
      width: 100%;
      max-width: 980px;
      min-height: 640px;
      display: none; /* CACHÉ AVANT LE CODE */
      grid-template-rows: auto 1fr;
      background: rgba(15, 23, 42, 0.65);
      border-radius: 24px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      backdrop-filter: blur(22px);
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.85);
    }

    /* HEADER */
    header {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(148, 163, 184, 0.3);
      background: linear-gradient(to right, rgba(15,23,42,0.9), rgba(30,64,175,0.7));
    }

    header h1 {
      font-size: 19px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 span.icon {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #38bdf8, #1d4ed8);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* LAYOUT */
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* PANELS */
    #access-container {
      width: 100%;
      max-width: 420px;
      background: rgba(15,23,42,0.7);
      padding: 30px;
      border-radius: 20px;
      border: 1px solid rgba(148,163,184,0.4);
      backdrop-filter: blur(18px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    #chat-left, #chat-right {
      display: none; /* CACHÉS AVANT LE CODE */
      padding: 20px;
      border-right: 1px solid rgba(148,163,184,0.2);
    }

    #chat-right { border-right: none; }

    /* INPUTS */
    input, button {
      width: 100%;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      padding: 12px 16px;
      font-size: 14px;
      background: rgba(15, 23, 42, 0.7);
      color: #e5e7eb;
      margin-top: 10px;
    }

    button {
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      border: none;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(37,99,235,0.55);
    }

    /* MESSAGES */
    #messages {
      height: 520px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-right: 6px;
    }

    .message-row {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.22s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #38bdf8, #1d4ed8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: white;
    }

    .message-card {
      background: rgba(15,23,42,0.75);
      border-radius: 18px;
      padding: 10px 14px;
      border: 1px solid rgba(148,163,184,0.4);
      backdrop-filter: blur(14px);
      max-width: 100%;
    }

    .message-header {
      display: flex;
      gap: 6px;
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 2px;
    }

    .message-body {
      font-size: 14px;
      color: #d1d5db;
      white-space: pre-wrap;
    }

  </style>
</head>
<body>

<!-- ÉCRAN D’ACCÈS -->
<div id="access-container">
  <h2 style="margin-bottom:10px;">Accès au chat</h2>
  <p style="font-size:14px;color:#9ca3af;margin-bottom:15px;">
    Entrez le code d’accès pour rejoindre le chat.
  </p>

  <input type="password" id="access-code" placeholder="Code d’accès">
  <button onclick="checkAccess()">Valider</button>
  <p id="error" style="color:#f87171;margin-top:10px;"></p>
</div>

<!-- APP CHAT -->
<div class="app-shell" id="app">

  <header>
    <h1><span class="icon">💬</span> Chat – Lycée Europe</h1>
  </header>

  <main>
    <!-- COLONNE GAUCHE -->
    <section id="chat-left">
      <h3>Votre pseudo</h3>
      <input type="text" id="pseudo" placeholder="Votre prénom ou pseudo">

      <h3 style="margin-top:20px;">Message</h3>
      <input type="text" id="message" placeholder="Votre message… (Entrée pour envoyer)">
      <button onclick="sendMessage()">Envoyer</button>

      <p id="chat-error" style="color:#f87171;margin-top:10px;"></p>
    </section>

    <!-- COLONNE DROITE -->
    <section id="chat-right">
      <h3 style="margin-bottom:10px;">Messages</h3>
      <div id="messages"></div>
    </section>
  </main>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
  const ACCESS_CODE = "C1EL2025";

  function checkAccess() {
    const code = document.getElementById("access-code").value.trim();
    const error = document.getElementById("error");

    if (code !== ACCESS_CODE) {
      error.textContent = "Code incorrect.";
      return;
    }

    // CACHER L’ÉCRAN D’ACCÈS
    document.getElementById("access-container").style.display = "none";

    // AFFICHER TOUT LE CHAT
    document.getElementById("app").style.display = "grid";
    document.getElementById("chat-left").style.display = "block";
    document.getElementById("chat-right").style.display = "block";
  }

  /* FIREBASE */
  firebase.initializeApp({
    apiKey: "AIzaSyAJxJpHd_gJweQs5nQHfrV5C5WPEKZ_F90",
    authDomain: "lycee-europe.firebaseapp.com",
    projectId: "lycee-europe"
  });

  const db = firebase.firestore();
  const messagesRef = db.collection("messages");

  async function sendMessage() {
    const pseudo = document.getElementById("pseudo").value.trim();
    const message = document.getElementById("message").value.trim();
    const error = document.getElementById("chat-error");

    if (!pseudo) { error.textContent = "Pseudo requis."; return; }
    if (!message) return;

    await messagesRef.add({
      pseudo,
      message,
      timestamp: new Date()
    });

    document.getElementById("message").value = "";
  }

  messagesRef.orderBy("timestamp").onSnapshot(snapshot => {
    const messagesDiv = document.getElementById("messages");
    messagesDiv.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();
      const row = document.createElement("div");
      row.className = "message-row";

      row.innerHTML = `
        <div class="avatar">${data.pseudo.charAt(0).toUpperCase()}</div>
        <div class="message-card">
          <div class="message-header">
            <span>${data.pseudo}</span>
            <span>${data.timestamp.toDate().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}</span>
          </div>
          <div class="message-body">${data.message}</div>
        </div>
      `;

      messagesDiv.appendChild(row);
    });

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
</script>

</body>
</html>
