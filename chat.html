<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tchat BTS - Lycée Europe</title>

    <!-- Thème spatial -->
    <link rel="stylesheet" href="styles/space-theme.css">

    <!-- Police Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="space-body">

    <div class="stars"></div>

    <header class="space-header">
        <nav class="space-navbar" aria-label="Navigation principale">
            <div class="navbar-left">
                <a href="hub.html" class="brand">LYCÉE EUROPE</a>
                <span class="badge-bts">BTS CIEL</span>
            </div>

            <div class="navbar-right">
                <span id="userEmailDisplay" class="user-email">Chargement...</span>
                <span class="user-status-dot" aria-hidden="true"></span>
                <span class="user-status-label">En ligne</span>
                <button id="logoutBtn" class="space-btn btn-small" type="button">
                    DÉCONNEXION
                </button>
            </div>
        </nav>
    </header>

    <main class="space-chat-layout" aria-label="Zone de discussion BTS CIEL">
        <section class="space-chat-card" aria-labelledby="room-title">
            <header class="space-chat-header">
                <div>
                    <h1 id="room-title"># GÉNÉRAL</h1>
                    <p class="room-subtitle">
                        Tchat principal de la promotion BTS CIEL — messages synchronisés en temps réel via Firebase.
                    </p>
                </div>
                <div class="room-meta">
                    <span class="room-pill">Canal public</span>
                    <span class="room-pill room-pill-secure">Connexion sécurisée</span>
                </div>
            </header>

            <div
                class="space-chat-messages"
                id="messagesList"
                aria-live="polite"
                aria-label="Messages du tchat"
            >
                <div class="message message--system">
                    Connexion au réseau encrypté...
                </div>
            </div>

            <form id="messageForm" class="space-chat-form" autocomplete="off">
                <label for="messageInput" class="visually-hidden">Votre message</label>
                <input
                    type="text"
                    id="messageInput"
                    class="space-input"
                    placeholder="Transmission de données..."
                    required
                >
                <button
                    type="submit"
                    class="space-btn"
                    id="sendBtn"
                >
                    ENVOYER
                </button>
            </form>
        </section>
    </main>

    <!-- Firebase + logique du tchat -->
    <script type="module" src="scripts/firebase-config.js" defer></script>
    <script type="module" src="scripts/chat.js" defer></script>
</body>
</html>
