<main>
    <div class="top-bar">
        <h1>Global Chat <i class="fas fa-circle" style="color:#22c55e; font-size: 0.6rem; margin-left:10px;"></i></h1>
        <div id="online-count" class="date-badge">42 en ligne</div>
    </div>

    <div id="chat-feed" class="chat-wrapper" style="flex:1; overflow-y:auto;">
        </div>

    <div class="input-area">
        <div class="capsule">
            <input type="text" id="pseudo-input" placeholder="Pseudo" style="width: 80px; border-right: 1px solid var(--border); margin-right: 15px;">
            <input type="text" id="msg-input" placeholder="Envoyer un signal...">
            <button class="btn-send" onclick="envoyer()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</main>
