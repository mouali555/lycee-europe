<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chat Public | Lycée</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <h1>SALON PUBLIC</h1>
    <a href="index.html" style="color: var(--accent); text-decoration: none; font-size: 0.9rem;"><i class="fas fa-arrow-left"></i> Retour</a>
</header>

<div class="container" style="grid-template-columns: 260px 1fr;">
    <aside>
        <div class="menu-box">
            <h3>Salons</h3>
            <nav>
                <ul>
                    <li><a href="chat.html" class="active"><i class="fas fa-hashtag"></i> général</a></li>
                    <li><a href="chatvip.html"><i class="fas fa-lock"></i> vip-only</a></li>
                </ul>
            </nav>
        </div>
    </aside>

    <main>
        <div class="card chat-container" id="chat-app">
            <div id="messages">
                </div>
            <div class="smart-input-bar">
                <input type="text" id="pseudo" placeholder="Pseudo" style="width: 120px; border-right: 1px solid var(--border);">
                <input type="text" id="msg" placeholder="Tapez votre message ici...">
                <button id="send-btn" onclick="envoyer()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCpo7up--nfVG4zj_Zeu4kB7pr34ad4ceM",
        authDomain: "lycee-europe-private.firebaseapp.com",
        projectId: "lycee-europe-private",
        storageBucket: "lycee-europe-private.firebasestorage.app",
        messagingSenderId: "259168134432",
        appId: "1:259168134432:web:470f5536d9305b4cf86345"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function envoyer() {
        const p = document.getElementById("pseudo").value;
        const m = document.getElementById("msg").value;
        if(p && m) {
            db.collection("messages").add({
                pseudo: p,
                message: m,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById("msg").value = "";
        }
    }

    db.collection("messages").orderBy("timestamp").onSnapshot(snap => {
        const box = document.getElementById("messages");
        box.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            box.innerHTML += `<div class="message-row">
                <div class="message-header">${d.pseudo}</div>
                <div class="message-card">${d.message}</div>
            </div>`;
        });
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
