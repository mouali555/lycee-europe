<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Chat - Global</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="app-container">
    <aside>
        <div class="logo"><i class="fas fa-microchip"></i> NEXUS</div>
        <nav>
            <a href="index.html"><i class="fas fa-th-large"></i> <span>Accueil</span></a>
            <a href="chat.html" class="active"><i class="fas fa-comments"></i> <span>Messages</span></a>
            <a href="chatvip.html"><i class="fas fa-crown"></i> <span>Elite</span></a>
        </nav>
    </aside>

    <main>
        <div class="top-bar">
            <h1 id="channel-title"># Général</h1>
            <div class="date-badge">Connecté</div>
        </div>

        <div class="channels-bar">
            <button class="chan-btn active" onclick="switchChannel('messages', '# Général')"># Général</button>
            <button class="chan-btn" onclick="switchChannel('cours', '# Ressources')"># Cours</button>
            <button class="chan-btn" onclick="switchChannel('projets', '# Projets')"># Projets</button>
        </div>

        <div id="chat-feed" class="chat-wrapper"></div>

        <div class="input-area">
            <div class="capsule">
                <input type="text" id="pseudo-input" placeholder="Pseudo" style="width:70px; border-right:1px solid var(--border); margin-right:15px;">
                <input type="text" id="msg-input" placeholder="Écrire dans ce canal...">
                <button class="btn-send" onclick="envoyer()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCpo7up--nfVG4zj_Zeu4kB7pr34ad4ceM",
        authDomain: "lycee-europe-private.firebaseapp.com",
        projectId: "lycee-europe-private",
        storageBucket: "lycee-europe-private.firebasestorage.app",
        messagingSenderId: "259168134432",
        appId: "1:259168134432:web:470f5536d9305b4cf86345"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentColl = "messages";
    let myPseudo = localStorage.getItem("chat_pseudo") || "Anonyme";
    document.getElementById("pseudo-input").value = myPseudo;

    function switchChannel(coll, title) {
        currentColl = coll;
        document.getElementById("channel-title").innerText = title;
        document.querySelectorAll('.chan-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        listen();
    }

    function envoyer() {
        const m = document.getElementById("msg-input").value.trim();
        const p = document.getElementById("pseudo-input").value.trim();
        if(m && p) {
            localStorage.setItem("chat_pseudo", p);
            db.collection(currentColl).add({
                pseudo: p, message: m,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById("msg-input").value = "";
        }
    }

    let unsubscribe;
    function listen() {
        if(unsubscribe) unsubscribe();
        unsubscribe = db.collection(currentColl).orderBy("timestamp").onSnapshot(snap => {
            const feed = document.getElementById("chat-feed");
            let html = "";
            snap.forEach(doc => {
                const d = doc.data();
                if(!d.timestamp) return;
                const isMe = d.pseudo === document.getElementById("pseudo-input").value;
                const time = d.timestamp.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                html += `
                <div class="msg-group ${isMe ? 'me' : ''}">
                    <div class="msg-info"><span>${d.pseudo}</span> • <span>${time}</span></div>
                    <div class="bubble" oncontextmenu="deleteMsg('${doc.id}'); return false;">${d.message}</div>
                </div>`;
            });
            feed.innerHTML = html;
            feed.scrollTop = feed.scrollHeight;
        });
    }

    async function deleteMsg(id) {
        if(confirm("Supprimer ce message ?")) {
            await db.collection(currentColl).doc(id).delete();
        }
    }

    listen();
    document.getElementById("msg-input").addEventListener("keypress", (e) => e.key === "Enter" && envoyer());
</script>
</body>
</html>
