<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat – Lycée Europe</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:"Segoe UI",system-ui,sans-serif;
  background:radial-gradient(circle at top left,#4f46e5,#0ea5e9,#020617);
  color:#e5e7eb;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== HEADER ===== */
header.global-header{
  padding:18px 40px;
  background:rgba(15,23,42,.8);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.15);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header .left{
  display:flex;
  align-items:center;
  gap:26px;
}

header img.logo{
  height:72px;
  border-radius:14px;
}

header nav a{
  margin-left:22px;
  color:#e5e7eb;
  text-decoration:none;
  font-size:16px;
  font-weight:500;
}

header nav a:hover{color:#93c5fd}

header img.home-btn{
  height:64px;
  cursor:pointer;
  transition:.2s;
}

header img.home-btn:hover{
  transform:scale(1.08);
}

/* ===== MAIN ===== */
main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
}

/* ===== ACCÈS ===== */
#access-screen{
  width:100%;
  max-width:420px;
  background:rgba(15,23,42,.7);
  padding:32px;
  border-radius:22px;
  border:1px solid rgba(148,163,184,.4);
  box-shadow:0 20px 50px rgba(0,0,0,.5);
}

#access-screen h2{
  font-size:22px;
  margin-bottom:10px;
}

input,button{
  width:100%;
  border-radius:999px;
  padding:14px 18px;
  margin-top:12px;
  background:rgba(15,23,42,.7);
  color:#e5e7eb;
  border:1px solid rgba(148,163,184,.6);
  font-size:15px;
}

button{
  background:linear-gradient(135deg,#38bdf8,#6366f1);
  border:none;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(37,99,235,.6);
}

button:hover{transform:translateY(-1px)}

#error{color:#f87171;margin-top:10px}

/* ===== CHAT ===== */
.chat-app{
  width:100%;
  max-width:900px;
  height:80vh;
  background:rgba(15,23,42,.65);
  border-radius:26px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow:0 25px 70px rgba(15,23,42,.9);
}

.chat-header{
  padding:18px 26px;
  font-size:20px;
  font-weight:600;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid rgba(148,163,184,.3);
}

#messages{
  flex:1;
  overflow-y:auto;
  padding:22px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.message-row{display:flex;gap:12px}

.avatar{
  width:38px;
  height:38px;
  border-radius:50%;
  background:linear-gradient(135deg,#38bdf8,#2563eb);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

.message-card{
  background:rgba(15,23,42,.8);
  padding:12px 16px;
  border-radius:20px;
  max-width:80%;
}

#bottom-bar{
  display:flex;
  gap:12px;
  padding:16px 22px;
  border-top:1px solid rgba(148,163,184,.3);
}

/* Nouvelle zone de texte améliorée */
#bottom-bar textarea{
  flex:1;
  resize:none;
  padding:14px 18px;
  font-size:16px;
  border-radius:18px;
  background:rgba(15,23,42,.7);
  border:1px solid rgba(148,163,184,.6);
  color:#e5e7eb;
  height:55px;
}

/* ===== FOOTER ===== */
footer{
  text-align:center;
  padding:16px;
  background:rgba(15,23,42,.6);
  border-top:1px solid rgba(255,255,255,.1);
}
</style>
</head>

<body>

<header class="global-header">
  <div class="left">
    <img src="logo.png" class="logo">
    <nav>
      <a href="index.html">Accueil</a>
      <a href="#">Chat</a>
      <a href="#">Infos</a>
    </nav>
  </div>
  <img src="bouton.png" class="home-btn" onclick="window.location='index.html'">
</header>

<main>
<div id="access-screen">
  <h2>Connexion au chat</h2>
  <input type="password" id="access-code" placeholder="Code d’accès">
  <input type="text" id="pseudo" placeholder="Pseudo (20 caractères max)">
  <button onclick="enterChat()">Entrer</button>
  <p id="error"></p>
</div>
</main>

<footer>© 2026 Lycée Europe</footer>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyAJxJpHd_gJweQs5nQHfrV5C5WPEKZ_F90",
  authDomain:"lycee-europe.firebaseapp.com",
  projectId:"lycee-europe"
});

const db=firebase.firestore();
const messagesRef=db.collection("messages");
let ACCESS_CODE=null;
let currentPseudo=null;

async function loadAccessCode(){
  const doc=await db.collection("config").doc("access").get();
  ACCESS_CODE=doc.data().code;
}

async function enterChat(){
  const code=document.getElementById("access-code").value.trim();
  const pseudo=document.getElementById("pseudo").value.trim();
  const error=document.getElementById("error");

  if(!code||!pseudo){error.textContent="Champs manquants";return;}
  if(pseudo.length>20){error.textContent="Pseudo trop long";return;}

  await loadAccessCode();
  if(code!==ACCESS_CODE){error.textContent="Code incorrect";return;}

  currentPseudo=pseudo;
  document.getElementById("access-screen").remove();
  loadChat();
  listenMessages();
}

function loadChat(){
  const app=document.createElement("div");
  app.className="chat-app";
  app.innerHTML=`
    <div class="chat-header">
      <div>💬 Chat – Lycée Europe</div>
      <div>${currentPseudo}</div>
    </div>
    <div id="messages"></div>
    <div id="bottom-bar">
      <textarea id="message" maxlength="500" placeholder="Votre message…"></textarea>
      <button onclick="sendMessage()">Envoyer</button>
    </div>`;
  document.querySelector("main").appendChild(app);
}

function listenMessages(){
  messagesRef.orderBy("timestamp").limit(100).onSnapshot(snap=>{
    const box=document.getElementById("messages");
    box.innerHTML="";
    snap.forEach(doc=>{
      const d=doc.data();

      const row=document.createElement("div");
      row.className="message-row";

      const avatar=document.createElement("div");
      avatar.className="avatar";
      avatar.textContent=d.pseudo[0].toUpperCase();

      const card=document.createElement("div");
      card.className="message-card";

      const head=document.createElement("div");
      head.textContent=d.pseudo+" • "+
        (d.timestamp?
        new Date(d.timestamp.toDate()).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}):"");

      const body=document.createElement("div");
      body.textContent=d.message;

      card.append(head,body);
      row.append(avatar,card);
      box.appendChild(row);
    });
    box.scrollTop=box.scrollHeight;
  });
}

async function sendMessage(){
  const input=document.getElementById("message");
  const text=input.value.trim();
  if(!text)return;

  await messagesRef.add({
    pseudo:currentPseudo,
    message:text,
    timestamp:firebase.firestore.FieldValue.serverTimestamp()
  });
  input.value="";
}
</script>

</body>
</html>
