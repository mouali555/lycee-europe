<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chat Public</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="app-container">
    <aside>
        <div class="logo"><i class="fas fa-atom"></i> BTS CIEL</div>
        <nav>
            <ul>
                <li><a href="index.html"><i class="fas fa-grid-2"></i> Dashboard</a></li>
                <li><a href="chat.html" class="active"><i class="fas fa-comments"></i> Chat Public</a></li>
                <li><a href="chatvip.html" class="vip-link"><i class="fas fa-gem"></i> Espace VIP</a></li>
            </ul>
        </nav>
    </aside>

    <main>
        <header>
            <h1>Salon Général <span style="font-size:1rem; color:var(--text-dim)">#public</span></h1>
        </header>

        <div class="card chat-window">
            <div id="messages" class="messages-area"></div>

            <div class="input-zone">
                <input type="text" id="pseudo" placeholder="Pseudo" style="width: 150px;">
                <input type="text" id="msg" placeholder="Écrivez votre message..." style="flex: 1;">
                <button class="send" onclick="envoyer()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCpo7up--nfVG4zj_Zeu4kB7pr34ad4ceM",
        authDomain: "lycee-europe-private.firebaseapp.com",
        projectId: "lycee-europe-private",
        storageBucket: "lycee-europe-private.firebasestorage.app",
        messagingSenderId: "259168134432",
        appId: "1:259168134432:web:470f5536d9305b4cf86345"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentPseudo = localStorage.getItem("chat_pseudo") || "";
    document.getElementById("pseudo").value = currentPseudo;

    function envoyer() {
        const p = document.getElementById("pseudo").value.trim();
        const m = document.getElementById("msg").value.trim();
        if(!p || !m) return;
        
        localStorage.setItem("chat_pseudo", p); // Sauvegarde le pseudo
        currentPseudo = p;

        db.collection("messages").add({
            pseudo: p, message: m,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById("msg").value = "";
    }

    db.collection("messages").orderBy("timestamp").onSnapshot(snap => {
        const div = document.getElementById("messages");
        div.innerHTML = "";
        snap.forEach(doc => {
            const data = doc.data();
            const isMe = data.pseudo === currentPseudo;
            
            div.innerHTML += `
                <div class="msg ${isMe ? 'me' : ''}">
                    <div class="msg-avatar">${data.pseudo[0].toUpperCase()}</div>
                    <div class="msg-content">
                        <span class="msg-pseudo">${data.pseudo}</span>
                        ${data.message}
                    </div>
                </div>`;
        });
        div.scrollTop = div.scrollHeight;
    });

    // Envoi avec Entrée
    document.getElementById("msg").addEventListener("keypress", (e) => e.key === "Enter" && envoyer());
</script>

</body>
</html>
