<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tchat — BTS CIEL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="styles/nature-theme.css">
</head>
<body class="chat-body">

    <div class="chat-layout">
        <!-- Topbar -->
        <header class="chat-topbar">
            <div class="chat-topbar-left">
                <a href="hub.html" class="chat-back-link" title="Retour">←</a>
                <span class="chat-topbar-title">Salon Général</span>
                <span style="font-size:0.72rem;font-weight:600;padding:0.18rem 0.6rem;border-radius:999px;background:rgba(124,111,247,0.15);color:#A89FFF;border:1px solid rgba(124,111,247,0.3)">BTS CIEL</span>
            </div>
            <div class="chat-topbar-right">
                <div class="chat-status">
                    <div class="status-dot"></div>
                    <span id="userEmailDisplay">Chargement…</span>
                </div>
                <button id="logoutBtn" class="btn-logout">Déconnexion</button>
            </div>
        </header>

        <!-- Room -->
        <main class="chat-room-container">
            <div class="chat-header">
                <h2>💬 Salon Général</h2>
                <p>Échanges en temps réel · Promotion BTS CIEL</p>
            </div>

            <div class="messages-list" id="messagesList">
                <div class="message system">Synchronisation en cours…</div>
            </div>

            <form id="messageForm" class="chat-form">
                <input type="text" id="messageInput" class="nature-input" placeholder="Écrire un message…" required autocomplete="off">
                <button type="submit" class="chat-send-btn" id="sendBtn" title="Envoyer">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </form>
        </main>
    </div>

    <script type="module" src="scripts/firebase-config.js"></script>
    <script type="module" src="scripts/chat.js"></script>
</body>
</html>
