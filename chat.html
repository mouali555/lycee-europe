<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tchat BTS - Le Salon Bleu</title>
    <link rel="stylesheet" href="styles/nature-theme.css">
</head>
<body>
    <div class="ambient-light"></div>
    
    <div class="chat-layout">
        <header class="chat-topbar">
            <div style="font-weight: 600; font-size: 1.2rem; display: flex; align-items: center; gap: 0.5rem;">
                <a href="hub.html" style="color: var(--text-main); text-decoration: none; font-size: 1.5rem;">←</a>
                <span>LYCÉE EUROPE <span style="color: var(--primary); font-size: 0.9rem; padding: 2px 8px; border: 1px solid var(--border-glass); border-radius: 12px; margin-left: 0.5rem; background: rgba(74, 222, 128, 0.1);">BTS CIEL</span></span>
            </div>
            
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <div style="width: 10px; height: 10px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary);"></div>
                    <span id="userEmailDisplay" style="font-size: 0.95rem; color: var(--text-muted);">Chargement...</span>
                </div>
                <button id="logoutBtn" style="background: transparent; border: 1px solid rgba(239, 68, 68, 0.5); color: var(--danger); padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; transition: all 0.3s; font-family: inherit;">Déconnexion</button>
            </div>
        </header>

        <main class="chat-room-container">
            <div class="chat-header">
                <h2>Salon Général 🌱</h2>
                <p>Échange en direct avec tes camarades de promotion.</p>
            </div>
            
            <div class="messages-list" id="messagesList">
                <div class="message system">Synchronisation avec l'Hôte...</div>
            </div>

            <form id="messageForm" class="chat-form">
                <input type="text" id="messageInput" class="nature-input" placeholder="Écrire un message..." required autocomplete="off">
                <button type="submit" class="nature-btn" id="sendBtn">ENVOYER</button>
            </form>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="scripts/firebase-config.js"></script>
    <script type="module" src="scripts/chat.js"></script>
</body>
</html>
