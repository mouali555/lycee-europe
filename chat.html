<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chat – Lycée Europe</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #e5e7eb;
      margin: 0;
      padding: 0;
    }

    header {
      background: #0a66c2;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    #access-container, #chat-container {
      max-width: 900px;
      margin: 30px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    #messages {
      height: 550px;
      overflow-y: auto;
      padding: 15px;
      background: #f3f4f6;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .message {
      display: flex;
      align-items: flex-start;
      margin-bottom: 15px;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 45px;
      height: 45px;
      background: #0a66c2;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-right: 12px;
      font-size: 20px;
      flex-shrink: 0;
    }

    .bubble {
      background: white;
      padding: 12px 16px;
      border-radius: 16px;
      max-width: 75%;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      font-size: 15px;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .bubble strong {
      color: #0a66c2;
      font-size: 14px;
    }

    .timestamp {
      font-size: 11px;
      color: #6b7280;
      margin-top: 4px;
    }

    input, button {
      padding: 12px;
      width: 100%;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      background: #0a66c2;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    button:hover:not(:disabled) {
      background: #084a8f;
    }

    #error, #chat-error {
      color: #b91c1c;
      margin-top: 8px;
      font-size: 14px;
    }

    #status {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<header>💬 Chat – Lycée Europe</header>

<!-- Écran de code d'accès -->
<div id="access-container">
  <h2>Accès réservé</h2>
  <p>Entrez le code d’accès pour utiliser le chat.</p>
  <input type="password" id="access-code" placeholder="Code d’accès">
  <button id="access-btn" onclick="checkAccess()">Valider</button>
  <div id="error"></div>
</div>

<!-- Chat (caché au début) -->
<div id="chat-container" style="display:none;">
  <p id="status">Chargement des messages…</p>
  <input type="text" id="pseudo" placeholder="Votre prénom ou pseudo">
  <div id="messages"></div>
  <input type="text" id="message" placeholder="Votre message... (Entrée pour envoyer)">
  <button id="send-btn" onclick="sendMessage()">Envoyer</button>
  <div id="chat-error"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
  /* ========= CONFIG GLOBALE ========= */
  const ACCESS_CODE = "C1EL2025"; // change ici si tu veux
  const MAX_MESSAGE_LENGTH = 500;

  /* ========= CODE D’ACCES ========= */
  function checkAccess() {
    const input = document.getElementById("access-code").value.trim();
    const errorDiv = document.getElementById("error");

    if (!input) {
      errorDiv.textContent = "Veuillez entrer un code.";
      return;
    }

    if (input === ACCESS_CODE) {
      document.getElementById("access-container").style.display = "none";
      document.getElementById("chat-container").style.display = "block";

      const savedPseudo = localStorage.getItem("pseudo");
      if (savedPseudo) {
        document.getElementById("pseudo").value = savedPseudo;
      }

      document.getElementById("message").focus();
    } else {
      errorDiv.textContent = "Code incorrect.";
    }
  }

  const accessInput = document.getElementById("access-code");
  accessInput.addEventListener("keydown", e => {
    if (e.key === "Enter") checkAccess();
  });

  /* ========= FIREBASE ========= */
  const firebaseConfig = {
    apiKey: "AIzaSyAJxJpHd_gJweQs5nQHfrV5C5WPEKZ_F90",
    authDomain: "lycee-europe.firebaseapp.com",
    projectId: "lycee-europe",
    storageBucket: "lycee-europe.appspot.com",
    messagingSenderId: "836743969706",
    appId: "1:836743969706:web:4f07c577d8a9d24afc09d3",
    measurementId: "G-Q89GM7Q0TX"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const messagesRef = db.collection("messages");

  /* ========= ENVOI MESSAGE ========= */
  async function sendMessage() {
    const pseudoInput = document.getElementById("pseudo");
    const messageInput = document.getElementById("message");
    const errorDiv = document.getElementById("chat-error");
    const sendBtn = document.getElementById("send-btn");

    const pseudo = pseudoInput.value.trim();
    const message = messageInput.value.trim();

    errorDiv.textContent = "";

    if (!pseudo) {
      errorDiv.textContent = "Veuillez entrer un pseudo.";
      pseudoInput.focus();
      return;
    }

    if (!message) {
      return;
    }

    if (message.length > MAX_MESSAGE_LENGTH) {
      errorDiv.textContent = "Message trop long (max " + MAX_MESSAGE_LENGTH + " caractères).";
      return;
    }

    try {
      sendBtn.disabled = true;

      await messagesRef.add({
        pseudo,
        message,
        timestamp: new Date()
      });

      localStorage.setItem("pseudo", pseudo);
      messageInput.value = "";
    } catch (err) {
      console.error("Erreur envoi message :", err);
      errorDiv.textContent = "Impossible d’envoyer le message. Réessayez.";
    } finally {
      sendBtn.disabled = false;
      messageInput.focus();
    }
  }

  const messageInput = document.getElementById("message");
  messageInput.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      e.preventDefault();
      sendMessage();
    }
  });

  /* ========= AFFICHAGE MESSAGES ========= */
  const messagesDiv = document.getElementById("messages");
  const statusText = document.getElementById("status");
  const chatError = document.getElementById("chat-error");

  messagesRef.orderBy("timestamp").onSnapshot(
    snapshot => {
      messagesDiv.innerHTML = "";
      statusText.textContent = "Messages chargés.";

      if (snapshot.empty) {
        messagesDiv.innerHTML = "<p style='color:#6b7280;'>Aucun message pour l’instant. Soyez le premier à écrire.</p>";
        return;
      }

      snapshot.forEach(doc => {
        const data = doc.data();
        const pseudo = data.pseudo || "Anonyme";
        const message = data.message || "";
        const avatarLetter = pseudo.charAt(0).toUpperCase();
        let time = "";

        if (data.timestamp && data.timestamp.toDate) {
          time = data.timestamp.toDate().toLocaleTimeString("fr-FR", {
            hour: "2-digit",
            minute: "2-digit"
          });
        }

        const msg = document.createElement("div");
        msg.classList.add("message");

        msg.innerHTML = `
          <div class="avatar">${avatarLetter}</div>
          <div>
            <div class="bubble">
              <strong>${pseudo}</strong><br>
              ${escapeHtml(message)}
            </div>
            <div class="timestamp">${time}</div>
          </div>
        `;

        messagesDiv.appendChild(msg);
      });

      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    },
    error => {
      console.error("Erreur Firestore :", error);
      statusText.textContent = "Erreur lors du chargement des messages.";
      chatError.textContent = "Impossible de récupérer les messages. Vérifiez la connexion ou les règles Firestore.";
    }
  );

  /* ========= PROTECTION XSS SIMPLE ========= */
  function escapeHtml(text) {
    const map = {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    };
    return text.replace(/[&<>"']/g, m => map[m]);
  }
</script>

</body>
</html>
