<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chat – Lycée Europe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(circle at top left, #4f46e5, #0ea5e9, #020617);
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header.global-header {
      width: 100%;
      padding: 14px 30px;
      background: rgba(15,23,42,0.75);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    header.global-header .left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header.global-header img.logo {
      height: 52px;
      border-radius: 8px;
    }

    header.global-header nav a {
      margin-left: 20px;
      color: #e5e7eb;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: 0.2s;
    }

    header.global-header nav a:hover {
      color: #93c5fd;
    }

    header.global-header img.home-btn {
      height: 44px;
      cursor: pointer;
      transition: 0.2s;
    }

    header.global-header img.home-btn:hover {
      transform: scale(1.05);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    #access-screen {
      width: 100%;
      max-width: 420px;
      background: rgba(15,23,42,0.7);
      padding: 30px;
      border-radius: 20px;
      border: 1px solid rgba(148,163,184,0.4);
      backdrop-filter: blur(18px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    #access-screen h2 {
      margin-bottom: 10px;
      font-size: 22px;
      font-weight: 600;
    }

    #access-screen p {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 15px;
    }

    input, button {
      width: 100%;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      padding: 13px 16px;
      font-size: 15px;
      background: rgba(15, 23, 42, 0.7);
      color: #e5e7eb;
      margin-top: 10px;
      outline: none;
    }

    button {
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      border: none;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(37,99,235,0.55);
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(37,99,235,0.7);
    }

    #error {
      margin-top: 10px;
      color: #f87171;
      font-size: 14px;
      min-height: 18px;
    }

    .chat-app {
      width: 100%;
      max-width: 900px;
      height: 80vh;
      background: rgba(15,23,42,0.65);
      border-radius: 24px;
      border: 1px solid rgba(148,163,184,0.35);
      backdrop-filter: blur(22px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(15,23,42,0.85);
    }

    .chat-header {
      padding: 16px 24px;
      font-size: 20px;
      font-weight: 600;
      border-bottom: 1px solid rgba(148,163,184,0.3);
      background: linear-gradient(to right, rgba(15,23,42,0.9), rgba(30,64,175,0.7));
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header .pseudo-display {
      font-size: 13px;
      color: #cbd5f5;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .message-row {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.22s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #38bdf8, #1d4ed8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: white;
      flex-shrink: 0;
    }

    .message-card {
      background: rgba(15,23,42,0.78);
      border-radius: 18px;
      padding: 10px 14px;
      border: 1px solid rgba(148,163,184,0.4);
      backdrop-filter: blur(14px);
      max-width: 80%;
      word-wrap: break-word;
    }

    #bottom-bar {
      padding: 14px 20px;
      background: rgba(15,23,42,0.9);
      border-top: 1px solid rgba(148,163,184,0.3);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #bottom-bar input {
      flex: 1;
      padding: 13px 16px;
      font-size: 15px;
      border-radius: 14px;
      background: rgba(15,23,42,0.7);
      border: 1px solid rgba(148,163,184,0.6);
    }

    #bottom-bar button {
      padding: 10px 16px;
      font-size: 14px;
      border-radius: 999px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      color: #cbd5e1;
      background: rgba(15,23,42,0.6);
      border-top: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

<header class="global-header">
  <div class="left">
    <img src="logo.png" class="logo" alt="Logo Lycée Europe">
    <nav>
      <a href="index.html">Accueil</a>
      <a href="#">Chat</a>
      <a href="#">Contact</a>
      <a href="#">Infos</a>
    </nav>
  </div>
  <img src="bouton.png" class="home-btn" alt="Accueil" onclick="window.location='index.html'">
</header>

<main>
  <div id="access-screen">
    <h2>Connexion au chat</h2>
    <p>Entrez le code d’accès et choisissez votre pseudo.</p>
    <input type="password" id="access-code" placeholder="Code d’accès">
    <input type="text" id="pseudo" placeholder="Votre pseudo">
    <button onclick="enterChat()">Entrer</button>
    <p id="error"></p>
  </div>
</main>

<footer>
  © 2026 Lycée Europe — Tous droits réservés
</footer>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-

</body>
</html>
