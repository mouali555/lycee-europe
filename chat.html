<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nexus - Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="app-container">
    <aside>
        <div class="logo"><i class="fas fa-microchip"></i> NEXUS</div>
        <nav>
            <a href="index.html"><i class="fas fa-th-large"></i> Accueil</a>
            <a href="chat.html" class="active"><i class="fas fa-comments"></i> Chat Global</a>
            <a href="chatvip.html"><i class="fas fa-crown"></i> Elite Zone</a>
        </nav>
    </aside>
    <main>
        <div class="top-bar"><h1># Général</h1></div>
        <div id="chat-feed" class="chat-wrapper"></div>
        <div class="input-area">
            <div class="capsule">
                <input type="text" id="pseudo" placeholder="Pseudo" style="width: 80px; color: var(--primary); border-right: 1px solid var(--border); margin-right: 15px;">
                <input type="text" id="msg" placeholder="Envoyer un message...">
                <button class="btn-send" onclick="envoyer()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyCpo7up--nfVG4zj_Zeu4kB7pr34ad4ceM", authDomain: "lycee-europe-private.firebaseapp.com", projectId: "lycee-europe-private" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function envoyer() {
        const m = document.getElementById("msg").value;
        const p = document.getElementById("pseudo").value;
        if(m && p) {
            db.collection("messages").add({ pseudo: p, message: m, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById("msg").value = "";
        }
    }

    db.collection("messages").orderBy("timestamp").onSnapshot(snap => {
        const feed = document.getElementById("chat-feed");
        let html = "";
        snap.forEach(doc => {
            const d = doc.data();
            const isMe = d.pseudo === document.getElementById("pseudo").value;
            html += `<div class="msg-group ${isMe ? 'me' : ''}"><div class="bubble">${d.message}</div></div>`;
        });
        feed.innerHTML = html;
        feed.scrollTop = feed.scrollHeight;
    });
    document.getElementById("msg").addEventListener("keypress", (e) => e.key === "Enter" && envoyer());
</script>
</body>
</html>
