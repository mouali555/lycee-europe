<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tchat · BTS CIEL</title>
    <link rel="stylesheet" href="styles/nature-theme.css">
</head>
<body class="chat-page">
<div class="chat-layout">

    <!-- Header -->
    <header class="chat-topbar">
        <div class="chat-topbar-left">
            <a href="hub.html" class="btn-icon" title="Retour au tableau de bord">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </a>
            <span class="chat-room-name">Salon Général</span>
            <span class="badge">BTS CIEL</span>
        </div>
        <div class="chat-topbar-right">
            <div class="online-indicator">
                <div class="online-dot"></div>
                <span id="userEmailDisplay">Chargement…</span>
            </div>
            <button id="logoutBtn" class="btn btn-danger-ghost">Déconnexion</button>
        </div>
    </header>

    <!-- Messages -->
    <main class="messages-area" id="messagesList">
        <div class="message system">
            <div class="message-inner">Connexion au salon en cours…</div>
        </div>
    </main>

    <!-- Input -->
    <footer class="chat-input-area">
        <form id="messageForm" style="display:contents">
            <input
                type="text"
                id="messageInput"
                class="input"
                placeholder="Écrire un message au salon…"
                autocomplete="off"
                required
            >
            <button type="submit" class="send-btn" id="sendBtn" title="Envoyer">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </form>
    </footer>

</div>

<script type="module" src="scripts/firebase-config.js"></script>
<script type="module" src="scripts/chat.js"></script>
</body>
</html>
