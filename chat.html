<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Public | Lycée de l'Europe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard">

    <nav class="sidebar">
        <div class="sidebar-logo">
            <i class="fas fa-graduation-cap"></i>
            <span>BTS CIEL</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-th-large"></i><span>Dashboard</span></a></li>
            <li><a href="chat.html" class="active"><i class="fas fa-comments"></i><span>Chat Public</span></a></li>
            <li><a href="chatvip.html"><i class="fas fa-shield-halved"></i><span>Espace VIP</span></a></li>
        </ul>
    </nav>

    <div class="main-content">
        <header class="top-bar">
            <div class="page-title">
                <h2>Salon Public</h2>
            </div>
            <div id="user-display" class="user-profile">
                </div>
        </header>

        <main class="dashboard-view">
            <div class="card chat-app-card">
                
                <div id="auth-overlay" class="auth-box">
                    <i class="fas fa-comments fa-3x" style="color: var(--accent-blue); margin-bottom: 20px;"></i>
                    <h3>Rejoindre la discussion</h3>
                    <input type="text" id="pseudo" placeholder="Entrez votre pseudo...">
                    <button onclick="enterChat()" class="action-btn" style="width: 100%; justify-content: center; background: var(--accent-blue); border: none; cursor: pointer;">
                        Démarrer
                    </button>
                </div>

                <div id="chat-interface" style="display: none;">
                    <div id="messages" class="messages-container"></div>
                    
                    <div class="input-area">
                        <input type="text" id="message" placeholder="Écrire dans #public...">
                        <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        let currentPseudo = null;
        const messagesRef = db.collection("messages");

        function enterChat() {
            const pseudo = document.getElementById("pseudo").value.trim();
            if (!pseudo) return;
            currentPseudo = pseudo;
            
            // UI Switch
            document.getElementById("auth-overlay").style.display = "none";
            document.getElementById("chat-interface").style.display = "flex";
            document.getElementById("user-display").innerHTML = `<span>${currentPseudo}</span><div class="status-dot"></div>`;
            
            listenMessages();
        }

        function listenMessages() {
            messagesRef.orderBy("timestamp").onSnapshot(snap => {
                const div = document.getElementById("messages");
                div.innerHTML = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    const isMe = data.pseudo === currentPseudo;
                    const msgRow = document.createElement("div");
                    msgRow.className = `msg-row ${isMe ? 'me' : ''}`;
                    
                    msgRow.innerHTML = `
                        <div class="msg-bubble">
                            <small>${data.pseudo}</small>
                            <p>${data.message}</p>
                        </div>
                    `;
                    div.appendChild(msgRow);
                });
                div.scrollTop = div.scrollHeight;
            });
        }

        async function sendMessage() {
            const input = document.getElementById("message");
            const text = input.value.trim();
            if (!text) return;
            input.value = "";
            await messagesRef.add({
                pseudo: currentPseudo,
                message: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        document.getElementById("message")?.addEventListener("keydown", e => e.key === "Enter" && sendMessage());
    </script>
</body>
</html>
