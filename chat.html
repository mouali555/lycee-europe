<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chat – Lycée Europe</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top left, #4f46e5, #0ea5e9, #020617);
      color: #e5e7eb;
    }

    /* ÉCRAN D’ACCÈS */
    #access-screen {
      width: 100%;
      max-width: 420px;
      background: rgba(15,23,42,0.7);
      padding: 30px;
      border-radius: 20px;
      border: 1px solid rgba(148,163,184,0.4);
      backdrop-filter: blur(18px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    #access-screen h2 {
      margin-bottom: 10px;
      font-size: 22px;
      font-weight: 600;
    }

    #access-screen p {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 15px;
    }

    input, button {
      width: 100%;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      padding: 12px 16px;
      font-size: 14px;
      background: rgba(15, 23, 42, 0.7);
      color: #e5e7eb;
      margin-top: 10px;
    }

    button {
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      border: none;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(37,99,235,0.55);
    }

    #error {
      margin-top: 10px;
      color: #f87171;
      font-size: 14px;
    }

    /* APP CHAT */
    #chat-app {
      width: 100%;
      max-width: 900px;
      height: 90vh;
      display: none; /* caché avant le code */
      background: rgba(15,23,42,0.65);
      border-radius: 24px;
      border: 1px solid rgba(148,163,184,0.35);
      backdrop-filter: blur(22px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(15,23,42,0.85);
    }

    header {
      padding: 16px 24px;
      font-size: 20px;
      font-weight: 600;
      border-bottom: 1px solid rgba(148,163,184,0.3);
      background: linear-gradient(to right, rgba(15,23,42,0.9), rgba(30,64,175,0.7));
    }

    /* ZONE MESSAGES */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message-row {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.22s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #38bdf8, #1d4ed8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: white;
    }

    .message-card {
      background: rgba(15,23,42,0.75);
      border-radius: 18px;
      padding: 10px 14px;
      border: 1px solid rgba(148,163,184,0.4);
      backdrop-filter: blur(14px);
      max-width: 80%;
    }

    .message-header {
      display: flex;
      gap: 6px;
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 2px;
    }

    .message-body {
      font-size: 14px;
      color: #d1d5db;
      white-space: pre-wrap;
    }

    /* BARRE EN BAS (STYLE MESSENGER) */
    #bottom-bar {
      padding: 14px 20px;
      background: rgba(15,23,42,0.8);
      border-top: 1px solid rgba(148,163,184,0.3);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #bottom-bar input {
      flex: 1;
      margin: 0;
    }

    #bottom-bar button {
      width: auto;
      padding: 12px 20px;
      border-radius: 999px;
    }
  </style>
</head>
<body>

<!-- ÉCRAN D’ACCÈS -->
<div id="access-screen">
  <h2>Connexion au chat</h2>
  <p>Entrez le code d’accès et choisissez votre pseudo.</p>

  <input type="password" id="access-code" placeholder="Code d’accès">
  <input type="text" id="pseudo" placeholder="Votre pseudo">

  <button onclick="enterChat()">Entrer</button>

  <p id="error"></p>
</div>

<!-- APP CHAT -->
<div id="chat-app">

  <header>💬 Chat – Lycée Europe</header>

  <div id="messages"></div>

  <div id="bottom-bar">
    <input type="text" id="message" placeholder="Votre message…">
    <button onclick="sendMessage()">Envoyer</button>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
  const ACCESS_CODE = "C1EL2025";

  function enterChat() {
    const code = document.getElementById("access-code").value.trim();
    const pseudo = document.getElementById("pseudo").value.trim();
    const error = document.getElementById("error");

    if (!code || !pseudo) {
      error.textContent = "Veuillez remplir tous les champs.";
      return;
    }

    if (code !== ACCESS_CODE) {
      error.textContent = "Code incorrect.";
      return;
    }

    // cacher l'écran d'accès
    document.getElementById("access-screen").style.display = "none";

    // afficher le chat
    document.getElementById("chat-app").style.display = "flex";

    localStorage.setItem("pseudo", pseudo);
  }

  /* FIREBASE */
  firebase.initializeApp({
    apiKey: "AIzaSyAJxJpHd_gJweQs5nQHfrV5C5WPEKZ_F90",
    authDomain: "lycee-europe.firebaseapp.com",
    projectId: "lycee-europe"
  });

  const db = firebase.firestore();
  const messagesRef = db.collection("messages");

  async function sendMessage() {
    const pseudo = localStorage.getItem("pseudo");
    const message = document.getElementById("message").value.trim();

    if (!message) return;

    await messagesRef.add({
      pseudo,
      message,
      timestamp: new Date()
    });

    document.getElementById("message").value = "";
  }

  messagesRef.orderBy("timestamp").onSnapshot(snapshot => {
    const messagesDiv = document.getElementById("messages");
    messagesDiv.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const row = document.createElement("div");
      row.className = "message-row";

      row.innerHTML = `
        <div class="avatar">${data.pseudo.charAt(0).toUpperCase()}</div>
        <div class="message-card">
          <div class="message-header">
            <span>${data.pseudo}</span>
            <span>${data.timestamp.toDate().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}</span>
          </div>
          <div class="message-body">${data.message}</div>
        </div>
      `;

      messagesDiv.appendChild(row);
    });

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
</script>

</body>
</html>
