<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to bottom, #ffcccb, #ffe4e1);
            animation: backgroundScroll 10s infinite;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        @keyframes backgroundScroll {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        .celebration {
            font-size: 2.5em;
            color: #800080;
            text-shadow: 2px 2px 5px #ffffff;
            margin-top: 20px;
            animation: glow 1.5s infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
            }
            to {
                text-shadow: 0 0 20px yellow, 0 0 30px #ff00ff;
            }
        }

        .balloon {
            position: absolute;
            bottom: -100px;
            width: 30px;
            height: 40px;
            background: radial-gradient(circle, #ff3399, #cc0066);
            border-radius: 50%;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.4);
            animation: fly 5s linear infinite;
        }

        @keyframes fly {
            from {
                transform: translateX(0) translateY(0);
            }
            to {
                transform: translateX(calc(100vw - 30px)) translateY(-150vh);
            }
        }

    </style>
</head>
<body>
    <div class="celebration">Joyeux Anniversaire, Johann!</div>
    <script>
        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');
            balloon.style.left = Math.random() * window.innerWidth + 'px';
            balloon.style.animationDuration = (5 + Math.random() * 3) + 's';
            document.body.appendChild(balloon);
            setTimeout(() => balloon.remove(), 5000);
        }

        setInterval(createBalloon, 300);
    </script>
</body>
</html>
